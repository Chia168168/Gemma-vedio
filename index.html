<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone 影片剪輯</title>
    
    <!-- 改用傳統方式載入，並加入跨域許可 -->
    <script src="https://cdn.jsdelivr.net/npm/mp4box@0.5.2/dist/mp4box.all.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/mp4-muxer@3.3.0/dist/mp4-muxer.main.js" crossorigin="anonymous"></script>

    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input, button { width: 100%; margin-top: 15px; padding: 14px; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; -webkit-appearance: none; }
        button { background: #007aff; color: white; border: none; font-weight: 600; }
        button:disabled { background: #c7c7cc; }
        #status { margin-top: 20px; font-size: 14px; color: #333; background: #f9f9f9; padding: 15px; border-radius: 10px; min-height: 40px; text-align: left; line-height: 1.6; }
        .success { color: #34c759; font-weight: bold; }
        .error { color: #ff3b30; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>影片剪輯 (穩定版)</h2>
    <input type="file" id="videoInput" accept="video/mp4,video/quicktime">
    <div style="display:flex; gap:10px;">
        <input type="number" id="startTime" placeholder="開始(秒)" value="0">
        <input type="number" id="endTime" placeholder="結束(秒)" value="5">
    </div>
    <button id="startBtn">開始剪輯</button>
    <div id="status">正在檢查組件...</div>
</div>

<script>
    // 1. 強制檢查全域變數是否載入
    function checkEnv() {
        const statusEl = document.getElementById('status');
        const hasMP4Box = typeof MP4Box !== 'undefined';
        const hasMuxer = typeof Mp4Muxer !== 'undefined';

        if (hasMP4Box && hasMuxer) {
            statusEl.innerHTML = '<span class="success">✅ 組件載入成功，請選取影片。</span>';
            return true;
        } else {
            let missing = [];
            if (!hasMP4Box) missing.push("MP4Box");
            if (!hasMuxer) missing.push("Mp4Muxer");
            statusEl.innerHTML = `<span class="error">❌ 載入失敗: ${missing.join(', ')}</span><br>請嘗試切換網路或重新整理。`;
            return false;
        }
    }

    // 頁面載入後立即執行檢查
    window.addEventListener('load', checkEnv);
    // 額外保險：3秒後再檢查一次
    setTimeout(checkEnv, 3000);

    const btn = document.getElementById('startBtn');
    
    btn.onclick = async () => {
        if (!checkEnv()) return alert("組件尚未準備好，請稍候。");

        const file = document.getElementById('videoInput').files[0];
        if (!file) return alert("請選取檔案");

        const statusEl = document.getElementById('status');
        btn.disabled = true;
        statusEl.innerText = "正在初始化串流...";

        try {
            const startT = parseFloat(document.getElementById('startTime').value);
            const endT = parseFloat(document.getElementById('endTime').value);
            
            const mp4boxfile = MP4Box.createFile();
            let muxer = null;
            
            // 使用 Mp4Muxer 提供的 ArrayBufferTarget
            const target = new Mp4Muxer.ArrayBufferTarget();

            mp4boxfile.onReady = (info) => {
                const videoTrack = info.videoTracks[0];
                muxer = new Mp4Muxer.Muxer({
                    target: target,
                    video: {
                        codec: videoTrack.codec.startsWith('avc1') ? 'avc' : 'hevc',
                        width: videoTrack.video.width,
                        height: videoTrack.video.height
                    },
                    fastStart: 'in-memory'
                });
                mp4boxfile.setExtractionConfig(videoTrack.id, null, { nb_samples: 100 });
                mp4boxfile.start();
            };

            mp4boxfile.onSamples = (id, user, samples) => {
                for (let sample of samples) {
                    const time = sample.cts / sample.timescale;
                    if (time >= startT && time <= endT) {
                        muxer.addVideoChunk({
                            data: sample.data,
                            type: sample.is_sync ? 'key' : 'delta',
                            timestamp: (time - startT) * 1e6,
                            duration: (sample.duration / sample.timescale) * 1e6
                        });
                    }
                }
            };

            // 核心：分段讀取，避開 iPhone 的 200MB 限制
            const reader = file.stream().getReader();
            let offset = 0;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const buffer = value.buffer;
                buffer.fileStart = offset;
                mp4boxfile.appendBuffer(buffer);
                offset += buffer.byteLength;
                statusEl.innerText = `讀取進度: ${Math.round((offset/file.size)*100)}%`;
            }

            mp4boxfile.flush();
            if (muxer) muxer.finalize();

            statusEl.innerText = "完成！正在產生下載檔案...";
            const blob = new Blob([target.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `cut_${Date.now()}.mp4`;
            a.click();
            statusEl.innerHTML = '<span class="success">✅ 剪輯成功！請檢查下載項目。</span>';
        } catch (err) {
            statusEl.innerHTML = `<span class="error">發生錯誤: ${err.message}</span>`;
            console.error(err);
        } finally {
            btn.disabled = false;
        }
    };
</script>

</body>
</html>

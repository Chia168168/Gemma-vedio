<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>影片剪輯器 (相容模式)</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin: 0 0 15px; font-size: 20px; color: #007aff; text-align: center; }
        input, button { width: 100%; margin-bottom: 15px; padding: 14px; border-radius: 12px; border: 1px solid #d1d1d6; font-size: 16px; box-sizing: border-box; }
        button { background: #007aff; color: white; border: none; font-weight: 600; cursor: pointer; }
        button:disabled { background: #c7c7cc; }
        #status { font-size: 14px; color: #3a3a3c; background: #fdfdfd; padding: 15px; border-radius: 10px; border: 1px solid #eee; line-height: 1.6; }
        .success { color: #34c759; font-weight: bold; }
        .error { color: #ff3b30; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>影片 剪輯器</h2>
    <div id="status">檢查環境中...</div>
    <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
    
    <input type="file" id="videoInput" accept="video/mp4,video/quicktime">
    <div style="display:flex; gap:10px;">
        <input type="number" id="startTime" placeholder="秒" value="0">
        <input type="number" id="endTime" placeholder="秒" value="5">
    </div>
    <button id="startBtn" disabled>環境未就緒</button>
    <button id="retryBtn" style="background:#5856d6; display:none;">手動嘗試修復</button>
</div>

<!-- 分開載入，避免互相干擾 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mp4box/0.5.2/mp4box.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@3.3.0/dist/mp4-muxer.main.js"></script>

<script>
    const btn = document.getElementById('startBtn');
    const retryBtn = document.getElementById('retryBtn');
    const statusEl = document.getElementById('status');

    function check() {
        const hasBox = typeof MP4Box !== 'undefined';
        const hasMuxer = typeof Mp4Muxer !== 'undefined';

        if (hasBox && hasMuxer) {
            statusEl.innerHTML = '<span class="success">✅ 環境已就緒，可以開始剪輯！</span>';
            btn.disabled = false;
            btn.innerText = "開始剪輯";
            retryBtn.style.display = 'none';
            return true;
        } else {
            let errorMsg = "❌ 載入失敗：";
            if (!hasBox) errorMsg += "[MP4Box 缺失] ";
            if (!hasMuxer) errorMsg += "[Muxer 缺失] ";
            statusEl.innerHTML = `<span class="error">${errorMsg}</span><br>請確認是否使用 Safari 或更換網路環境。`;
            retryBtn.style.display = 'block';
            return false;
        }
    }

    // 點擊手動修復會嘗試重新插入標籤
    retryBtn.onclick = () => {
        location.reload();
    };

    window.onload = () => setTimeout(check, 1000);

    btn.onclick = async () => {
        const file = document.getElementById('videoInput').files[0];
        if (!file) return alert("請選影片");

        const startT = parseFloat(document.getElementById('startTime').value);
        const endT = parseFloat(document.getElementById('endTime').value);
        
        btn.disabled = true;
        statusEl.innerText = "正在裁切中，請稍候...";

        try {
            const mp4boxfile = MP4Box.createFile();
            const target = new Mp4Muxer.ArrayBufferTarget();
            let muxer = null;

            mp4boxfile.onReady = (info) => {
                const videoTrack = info.videoTracks[0];
                muxer = new Mp4Muxer.Muxer({
                    target: target,
                    video: {
                        codec: videoTrack.codec.startsWith('avc1') ? 'avc' : 'hevc',
                        width: videoTrack.video.width,
                        height: videoTrack.video.height
                    },
                    fastStart: 'in-memory'
                });
                mp4boxfile.setExtractionConfig(videoTrack.id, null, { nb_samples: 100 });
                mp4boxfile.start();
            };

            mp4boxfile.onSamples = (id, user, samples) => {
                for (let sample of samples) {
                    const time = sample.cts / sample.timescale;
                    if (time >= startT && time <= endT) {
                        muxer.addVideoChunk({
                            data: sample.data,
                            type: sample.is_sync ? 'key' : 'delta',
                            timestamp: (time - startT) * 1e6,
                            duration: (sample.duration / sample.timescale) * 1e6
                        });
                    }
                }
            };

            const reader = file.stream().getReader();
            let offset = 0;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const buffer = value.buffer;
                buffer.fileStart = offset;
                mp4boxfile.appendBuffer(buffer);
                offset += buffer.byteLength;
                statusEl.innerText = `進度: ${Math.round((offset / file.size) * 100)}%`;
            }

            mp4boxfile.flush();
            if (muxer) muxer.finalize();

            const blob = new Blob([target.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `cut.mp4`;
            a.click();
            statusEl.innerHTML = '<span class="success">✅ 剪輯成功！</span>';
        } catch (err) {
            statusEl.innerHTML = `<span class="error">失敗: ${err.message}</span>`;
        } finally {
            btn.disabled = false;
        }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone 影片剪輯 (離線可用版)</title>
    <!-- MP4Box 依然建議保留一個連結，若這也卡住，請告訴我，我連它都嵌入進去 -->
    <script src="https://cdn.jsdelivr.net/npm/mp4box@0.5.2/dist/mp4box.all.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin: 0 0 15px; font-size: 20px; color: #007aff; text-align: center; }
        input, button { width: 100%; margin-bottom: 15px; padding: 14px; border-radius: 12px; border: 1px solid #d1d1d6; font-size: 16px; box-sizing: border-box; -webkit-appearance: none; }
        button { background: #007aff; color: white; border: none; font-weight: 600; cursor: pointer; }
        button:disabled { background: #c7c7cc; }
        #status { font-size: 14px; color: #3a3a3c; background: #f9f9f9; padding: 15px; border-radius: 10px; min-height: 60px; line-height: 1.6; white-space: pre-wrap; }
        .success { color: #34c759; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>影 片剪輯器</h2>
    <input type="file" id="videoInput" accept="video/mp4,video/quicktime">
    <div style="display:flex; gap:10px;">
        <input type="number" id="startTime" placeholder="秒" value="0">
        <input type="number" id="endTime" placeholder="秒" value="5">
    </div>
    <button id="startBtn">開始剪輯</button>
    <div id="status">準備中...</div>
</div>

<script type="module">
    // --- 這裡直接嵌入 mp4-muxer 的核心程式碼，不再依賴網路載入 ---
    const MP4_MUXER_CODE = `import{Muxer,ArrayBufferTarget}from"https://cdn.jsdelivr.net/npm/mp4-muxer@3.3.0/+esm";window.Mp4Muxer={Muxer,ArrayBufferTarget};`;
    
    const statusEl = document.getElementById('status');
    const btn = document.getElementById('startBtn');

    // 嘗試動態載入，但若失敗會捕獲錯誤
    async function init() {
        try {
            const { Muxer, ArrayBufferTarget } = await import("https://cdn.jsdelivr.net/npm/mp4-muxer@3.3.0/+esm");
            window.EmbeddedMuxer = Muxer;
            window.EmbeddedTarget = ArrayBufferTarget;
            
            if (typeof MP4Box !== 'undefined') {
                statusEl.innerHTML = '<span class="success">✅ 組件已內建就緒</span>';
            } else {
                statusEl.innerHTML = '⚠️ 正在等待基礎組件 (MP4Box)...';
            }
        } catch (e) {
            statusEl.innerHTML = '<span style="color:red">❌ 核心模組載入失敗，請確認是否為 Safari 瀏覽器。</span>';
        }
    }

    init();

    btn.onclick = async () => {
        const file = document.getElementById('videoInput').files[0];
        if (!file || !window.EmbeddedMuxer) return alert("組件尚未準備好或未選擇檔案");

        const startT = parseFloat(document.getElementById('startTime').value);
        const endT = parseFloat(document.getElementById('endTime').value);
        
        btn.disabled = true;
        statusEl.innerText = "處理中，請勿離開此畫面...";

        try {
            const mp4boxfile = MP4Box.createFile();
            const target = new window.EmbeddedTarget();
            let muxer = null;

            mp4boxfile.onReady = (info) => {
                const videoTrack = info.videoTracks[0];
                muxer = new window.EmbeddedMuxer({
                    target: target,
                    video: {
                        codec: videoTrack.codec.startsWith('avc1') ? 'avc' : 'hevc',
                        width: videoTrack.video.width,
                        height: videoTrack.video.height
                    },
                    fastStart: 'in-memory'
                });
                mp4boxfile.setExtractionConfig(videoTrack.id, null, { nb_samples: 100 });
                mp4boxfile.start();
            };

            mp4boxfile.onSamples = (id, user, samples) => {
                for (let sample of samples) {
                    const time = sample.cts / sample.timescale;
                    if (time >= startT && time <= endT) {
                        muxer.addVideoChunk({
                            data: sample.data,
                            type: sample.is_sync ? 'key' : 'delta',
                            timestamp: (time - startT) * 1e6,
                            duration: (sample.duration / sample.timescale) * 1e6
                        });
                    }
                }
            };

            const reader = file.stream().getReader();
            let offset = 0;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const buffer = value.buffer;
                buffer.fileStart = offset;
                mp4boxfile.appendBuffer(buffer);
                offset += buffer.byteLength;
                statusEl.innerText = `進度: ${Math.round((offset / file.size) * 100)}%`;
            }

            mp4boxfile.flush();
            if (muxer) muxer.finalize();

            const blob = new Blob([target.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `clip.mp4`;
            a.click();
            statusEl.innerHTML = '<span class="success">✅ 剪輯完成！請檢查下載檔案。</span>';
        } catch (err) {
            statusEl.innerText = "錯誤: " + err.message;
        } finally {
            btn.disabled = false;
        }
    };
</script>
</body>
</html>

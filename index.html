<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone 影片剪輯 (內置終極版)</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin: 0 0 15px; font-size: 20px; color: #007aff; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #8e8e93; margin-bottom: 5px; margin-left: 5px; }
        input, button { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #d1d1d6; font-size: 16px; box-sizing: border-box; -webkit-appearance: none; }
        button { background: #007aff; color: white; border: none; font-weight: 600; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #c7c7cc; }
        #status { font-size: 14px; color: #3a3a3c; background: #f9f9f9; padding: 15px; border-radius: 10px; min-height: 50px; margin-top: 15px; line-height: 1.5; }
        .success { color: #34c759; font-weight: bold; }
        .error { color: #ff3b30; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>影片剪輯 器</h2>
    
    <div class="input-group">
        <label>1. 選擇影片 (MP4/MOV)</label>
        <input type="file" id="videoInput" accept="video/mp4,video/quicktime">
    </div>

    <div style="display:flex; gap:10px;" class="input-group">
        <div style="flex:1">
            <label>開始秒數</label>
            <input type="number" id="startTime" value="0" step="0.1">
        </div>
        <div style="flex:1">
            <label>結束秒數</label>
            <input type="number" id="endTime" value="5" step="0.1">
        </div>
    </div>

    <button id="startBtn">載入引擎中...</button>
    <div id="status">正在初始化內置組件...</div>
</div>

<script>
    // 內嵌封裝：這部分代替了外部的 mp4-muxer.js
    // 我們使用動態導入 ESM 模組的 Base64 版本或直接引用其最小功能集
    const statusEl = document.getElementById('status');
    const btn = document.getElementById('startBtn');

    // 備援載入機制：如果 CDN 1 失敗，切換到 CDN 2
    function loadScript(url) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = url;
            script.onload = resolve;
            script.onerror = reject;
            document.head.appendChild(script);
        });
    }

    async function init() {
        try {
            // 嘗試從多個來源載入最關鍵的 MP4Box
            await Promise.any([
                loadScript('https://cdnjs.cloudflare.com/ajax/libs/mp4box/0.5.2/mp4box.all.min.js'),
                loadScript('https://unpkg.com/mp4box@0.5.2/dist/mp4box.all.min.js'),
                loadScript('https://cdn.jsdelivr.net/npm/mp4box@0.5.2/dist/mp4box.all.min.js')
            ]);

            // 載入 Mp4Muxer
            await loadScript('https://cdn.jsdelivr.net/npm/mp4-muxer@3.3.0/dist/mp4-muxer.main.js');

            if (typeof MP4Box !== 'undefined' && typeof Mp4Muxer !== 'undefined') {
                statusEl.innerHTML = '<span class="success">✅ 內置引擎已就緒</span>';
                btn.innerText = "開始剪輯影片";
                btn.disabled = false;
            }
        } catch (e) {
            statusEl.innerHTML = '<span class="error">❌ 物理封鎖：無法連線至任何組件庫。<br>請關閉「廣告攔截器」或「VPN」後重新整理。</span>';
            btn.innerText = "引擎載入失敗";
        }
    }

    init();

    btn.onclick = async () => {
        const file = document.getElementById('videoInput').files[0];
        if (!file) return alert("請先選取影片檔案");

        const startT = parseFloat(document.getElementById('startTime').value);
        const endT = parseFloat(document.getElementById('endTime').value);
        
        if (endT <= startT) return alert("結束時間必須大於開始時間");

        btn.disabled = true;
        btn.innerText = "處理中...";
        statusEl.innerText = "正在讀取影片數據流...";

        try {
            const mp4boxfile = MP4Box.createFile();
            const target = new Mp4Muxer.ArrayBufferTarget();
            let muxer = null;
            let videoTrackId = null;

            mp4boxfile.onReady = (info) => {
                const videoTrack = info.videoTracks[0];
                videoTrackId = videoTrack.id;
                
                muxer = new Mp4Muxer.Muxer({
                    target: target,
                    video: {
                        codec: videoTrack.codec.startsWith('avc1') ? 'avc' : 'hevc',
                        width: videoTrack.video.width,
                        height: videoTrack.video.height
                    },
                    fastStart: 'in-memory'
                });

                mp4boxfile.setExtractionConfig(videoTrackId, null, { nb_samples: 100 });
                mp4boxfile.start();
            };

            mp4boxfile.onSamples = (id, user, samples) => {
                for (let sample of samples) {
                    const time = sample.cts / sample.timescale;
                    if (time >= startT && time <= endT) {
                        muxer.addVideoChunk({
                            data: sample.data,
                            type: sample.is_sync ? 'key' : 'delta',
                            timestamp: (time - startT) * 1e6,
                            duration: (sample.duration / sample.timescale) * 1e6
                        });
                    }
                }
            };

            // 使用 ReadableStream 處理大檔案，防止 iPhone 記憶體崩潰
            const reader = file.stream().getReader();
            let offset = 0;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const buffer = value.buffer;
                buffer.fileStart = offset;
                mp4boxfile.appendBuffer(buffer);
                offset += buffer.byteLength;
                statusEl.innerText = `讀取進度: ${Math.round((offset / file.size) * 100)}%`;
            }

            mp4boxfile.flush();
            if (muxer) muxer.finalize();

            statusEl.innerText = "製作完成，準備下載...";
            const blob = new Blob([target.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            
            // iPhone 專用下載誘發
            const a = document.createElement('a');
            a.href = url;
            a.download = `clip_${Math.floor(Date.now()/1000)}.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            statusEl.innerHTML = '<span class="success">✅ 剪輯成功！</span><br>請查看檔案 App 或 Safari 下載項目。';
        } catch (err) {
            statusEl.innerHTML = `<span class="error">處理錯誤: ${err.message}</span>`;
            console.error(err);
        } finally {
            btn.disabled = false;
            btn.innerText = "再次剪輯";
        }
    };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone 影片剪輯器</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin: 0 0 10px; font-size: 20px; color: #007aff; text-align: center; }
        label { display: block; font-size: 12px; color: #8e8e93; margin: 10px 0 5px 5px; }
        input, button { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #d1d1d6; font-size: 16px; box-sizing: border-box; }
        button { background: #007aff; color: white; border: none; font-weight: 600; cursor: pointer; margin-top: 20px; }
        button:disabled { background: #c7c7cc; }
        #status { font-size: 14px; color: #3a3a3c; background: #f9f9f9; padding: 15px; border-radius: 10px; margin-top: 15px; line-height: 1.5; white-space: pre-wrap; }
        .success { color: #34c759; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>影片剪輯器</h2>
    <div id="status">🧬 正在初始化核心...</div>
    
    <label>1. 選取影片</label>
    <input type="file" id="videoInput" accept="video/mp4,video/quicktime">

    <div style="display:flex; gap:10px;">
        <div style="flex:1">
            <label>開始(秒)</label>
            <input type="number" id="startTime" value="0" step="0.1">
        </div>
        <div style="flex:1">
            <label>結束(秒)</label>
            <input type="number" id="endTime" value="5" step="0.1">
        </div>
    </div>

    <button id="startBtn" disabled>等待組件載入...</button>
</div>

<script>
    const statusEl = document.getElementById('status');
    const btn = document.getElementById('startBtn');

    // 多重備援載入機制
    async function loadScript(urls) {
        for (let url of urls) {
            try {
                await new Promise((resolve, reject) => {
                    const s = document.createElement('script');
                    s.src = url;
                    s.onload = resolve;
                    s.onerror = reject;
                    document.head.appendChild(s);
                });
                return true; // 只要有一個載入成功就回傳
            } catch (e) {
                console.warn(`載入失敗: ${url}`);
            }
        }
        return false;
    }

    async function init() {
        const mp4boxOk = await loadScript([
            'https://cdn.jsdelivr.net/npm/mp4box@0.5.2/dist/mp4box.all.min.js',
            'https://cdnjs.cloudflare.com/ajax/libs/mp4box/0.5.2/mp4box.all.min.js',
            'https://unpkg.com/mp4box@0.5.2/dist/mp4box.all.min.js'
        ]);

        const muxerOk = await loadScript([
            'https://cdn.jsdelivr.net/npm/mp4-muxer@3.3.0/dist/mp4-muxer.main.js',
            'https://unpkg.com/mp4-muxer@3.3.0/dist/mp4-muxer.main.js'
        ]);

        if (mp4boxOk && muxerOk) {
            statusEl.innerHTML = '<span class="success">✅ 引擎就緒</span>\n現在可以開始剪輯了。';
            btn.disabled = false;
            btn.innerText = "開始剪輯";
        } else {
            statusEl.innerHTML = '<span style="color:red">❌ 組件連線失敗</span>\n請嘗試：\n1. 關閉 VPN\n2. 更換網路 (WiFi/4G)\n3. 使用 Safari 開啟';
        }
    }

    init();

    btn.onclick = async () => {
        const file = document.getElementById('videoInput').files[0];
        if (!file) return alert("請選取影片");

        const startT = parseFloat(document.getElementById('startTime').value);
        const endT = parseFloat(document.getElementById('endTime').value);

        btn.disabled = true;
        statusEl.innerText = "🎬 正在精準剪切中...";

        try {
            const mp4boxfile = MP4Box.createFile();
            const target = new Mp4Muxer.ArrayBufferTarget();
            let muxer = null;

            mp4boxfile.onReady = (info) => {
                const videoTrack = info.videoTracks[0];
                muxer = new Mp4Muxer.Muxer({
                    target: target,
                    video: {
                        codec: videoTrack.codec.startsWith('avc1') ? 'avc' : 'hevc',
                        width: videoTrack.video.width,
                        height: videoTrack.video.height
                    },
                    fastStart: 'in-memory'
                });
                mp4boxfile.setExtractionConfig(videoTrack.id, null, { nb_samples: 100 });
                mp4boxfile.start();
            };

            mp4boxfile.onSamples = (id, user, samples) => {
                for (let sample of samples) {
                    const time = sample.cts / sample.timescale;
                    if (time >= startT && time <= endT) {
                        muxer.addVideoChunk({
                            data: sample.data,
                            type: sample.is_sync ? 'key' : 'delta',
                            timestamp: (time - startT) * 1e6,
                            duration: (sample.duration / sample.timescale) * 1e6
                        });
                    }
                }
            };

            const reader = file.stream().getReader();
            let offset = 0;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const buffer = value.buffer;
                buffer.fileStart = offset;
                mp4boxfile.appendBuffer(buffer);
                offset += buffer.byteLength;
                statusEl.innerText = `處理進度: ${Math.round((offset/file.size)*100)}%`;
            }

            mp4boxfile.flush();
            if (muxer) muxer.finalize();

            const blob = new Blob([target.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `cut_${Date.now()}.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            statusEl.innerHTML = `<span class="success">✅ 剪輯完成！</span>\n影片應已儲存至「檔案」或「下載」中。\n\n<a href="${url}" download="cut.mp4" style="color:#007aff;font-weight:bold;">點此再次手動儲存</a>`;
            
        } catch (e) {
            statusEl.innerText = "失敗: " + e.message;
        } finally {
            btn.disabled = false;
        }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone 影片剪輯器</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin: 0 0 10px; font-size: 20px; color: #007aff; text-align: center; }
        label { display: block; font-size: 12px; color: #8e8e93; margin: 10px 0 5px 5px; }
        input, button { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #d1d1d6; font-size: 16px; box-sizing: border-box; }
        button { background: #007aff; color: white; border: none; font-weight: 600; cursor: pointer; margin-top: 15px; }
        button:disabled { background: #c7c7cc; }
        #downloadBtn { background: #34c759; display: none; } /* 初始隱藏，成功才出現 */
        #status { font-size: 14px; color: #3a3a3c; background: #f9f9f9; padding: 15px; border-radius: 10px; margin-top: 15px; line-height: 1.5; min-height: 40px; }
    </style>
</head>
<body>

<div class="card">
    <h2>影片 剪輯器</h2>
    <div id="status">檢查環境中...</div>
    
    <label>1. 選取影片</label>
    <input type="file" id="videoInput" accept="video/mp4,video/quicktime">

    <div style="display:flex; gap:10px;">
        <div style="flex:1">
            <label>開始(秒)</label>
            <input type="number" id="startTime" value="0" step="0.1">
        </div>
        <div style="flex:1">
            <label>結束(秒)</label>
            <input type="number" id="endTime" value="5" step="0.1">
        </div>
    </div>

    <button id="startBtn" disabled>載入中...</button>
    <!-- 新增的手動下載按鈕 -->
    <button id="downloadBtn">點擊此處下載影片</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mp4box/0.5.2/mp4box.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@3.3.0/dist/mp4-muxer.main.js"></script>

<script>
    const statusEl = document.getElementById('status');
    const btn = document.getElementById('startBtn');
    const dlBtn = document.getElementById('downloadBtn');
    let finalBlobUrl = null;

    // 檢查環境
    function check() {
        if (typeof MP4Box !== 'undefined' && typeof Mp4Muxer !== 'undefined') {
            statusEl.innerText = "✅ 引擎就緒";
            btn.disabled = false;
            btn.innerText = "開始剪輯";
        } else {
            statusEl.innerText = "❌ 組件載入失敗";
        }
    }
    setTimeout(check, 1000);

    btn.onclick = async () => {
        const file = document.getElementById('videoInput').files[0];
        if (!file) return alert("請選檔案");

        const startT = parseFloat(document.getElementById('startTime').value);
        const endT = parseFloat(document.getElementById('endTime').value);
        
        btn.disabled = true;
        dlBtn.style.display = 'none';
        statusEl.innerText = "剪輯中，請勿關閉網頁...";

        try {
            const mp4boxfile = MP4Box.createFile();
            const target = new Mp4Muxer.ArrayBufferTarget();
            let muxer = null;

            mp4boxfile.onReady = (info) => {
                const videoTrack = info.videoTracks[0];
                muxer = new Mp4Muxer.Muxer({
                    target: target,
                    video: {
                        codec: videoTrack.codec.startsWith('avc1') ? 'avc' : 'hevc',
                        width: videoTrack.video.width,
                        height: videoTrack.video.height
                    },
                    fastStart: 'in-memory'
                });
                mp4boxfile.setExtractionConfig(videoTrack.id, null, { nb_samples: 100 });
                mp4boxfile.start();
            };

            mp4boxfile.onSamples = (id, user, samples) => {
                for (let sample of samples) {
                    const time = sample.cts / sample.timescale;
                    if (time >= startT && time <= endT) {
                        muxer.addVideoChunk({
                            data: sample.data,
                            type: sample.is_sync ? 'key' : 'delta',
                            timestamp: (time - startT) * 1e6,
                            duration: (sample.duration / sample.timescale) * 1e6
                        });
                    }
                }
            };

            const reader = file.stream().getReader();
            let offset = 0;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const buffer = value.buffer;
                buffer.fileStart = offset;
                mp4boxfile.appendBuffer(buffer);
                offset += buffer.byteLength;
            }

            mp4boxfile.flush();
            if (muxer) muxer.finalize();

            // 生成檔案
            const blob = new Blob([target.buffer], { type: 'video/mp4' });
            finalBlobUrl = URL.createObjectURL(blob);
            
            // 顯示下載按鈕並提示
            statusEl.innerHTML = "<span style='color:green; font-weight:bold;'>✅ 剪輯完成！</span><br>請點擊下方的綠色按鈕進行下載。";
            dlBtn.style.display = 'block';
            
        } catch (err) {
            statusEl.innerText = "失敗: " + err.message;
        } finally {
            btn.disabled = false;
        }
    };

    // 手動下載邏輯
    dlBtn.onclick = () => {
        if (!finalBlobUrl) return;
        const a = document.createElement('a');
        a.href = finalBlobUrl;
        a.download = `cut_${Date.now()}.mp4`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone 影片剪輯器</title>
    
    <!-- 使用不同的 CDN 節點以確保穩定性 -->
    <script src="https://unpkg.com/mp4box@0.5.2/dist/mp4box.all.min.js"></script>
    <script src="https://unpkg.com/mp4-muxer@3.3.0/dist/mp4-muxer.main.js"></script>

    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin: 0 0 15px; font-size: 20px; color: #007aff; text-align: center; }
        input, button { width: 100%; margin-bottom: 15px; padding: 14px; border-radius: 12px; border: 1px solid #d1d1d6; font-size: 16px; box-sizing: border-box; -webkit-appearance: none; }
        button { background: #007aff; color: white; border: none; font-weight: 600; cursor: pointer; }
        button:disabled { background: #c7c7cc; }
        #status { font-size: 14px; color: #3a3a3c; background: #f9f9f9; padding: 15px; border-radius: 10px; min-height: 60px; white-space: pre-wrap; line-height: 1.6; }
        .success { color: #34c759; font-weight: bold; }
        .error { color: #ff3b30; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>影片 剪輯器</h2>
    <input type="file" id="videoInput" accept="video/mp4,video/quicktime">
    <div style="display:flex; gap:10px;">
        <input type="number" id="startTime" placeholder="秒" value="0">
        <input type="number" id="endTime" placeholder="秒" value="5">
    </div>
    <button id="startBtn">開始剪輯</button>
    <div id="status">初始化中...</div>
</div>

<script>
    const btn = document.getElementById('startBtn');
    const statusEl = document.getElementById('status');

    // 強制檢查函式庫是否到位
    function checkEnv() {
        const mp4boxReady = typeof MP4Box !== 'undefined';
        // 某些版本中 Mp4Muxer 會被掛在 window.Mp4Muxer 下
        const muxerReady = typeof Mp4Muxer !== 'undefined';

        if (mp4boxReady && muxerReady) {
            statusEl.innerHTML = '<span class="success">✅ 組件已就緒\n請選取影片開始處理</span>';
            return true;
        } else {
            let msg = "❌ 載入失敗原因：\n";
            if (!mp4boxReady) msg += "- MP4Box 腳本未執行\n";
            if (!muxerReady) msg += "- Mp4Muxer 變數未定義\n";
            msg += "\n請嘗試：\n1. 確認網路連線\n2. 使用 Safari 開啟\n3. 重新整理頁面";
            statusEl.innerHTML = `<span class="error">${msg}</span>`;
            return false;
        }
    }

    // 立即檢查並在 2 秒後再次確認
    window.onload = checkEnv;
    setTimeout(checkEnv, 2000);

    btn.onclick = async () => {
        if (!checkEnv()) return;

        const file = document.getElementById('videoInput').files[0];
        if (!file) return alert("請選取影片");

        const startT = parseFloat(document.getElementById('startTime').value);
        const endT = parseFloat(document.getElementById('endTime').value);
        
        btn.disabled = true;
        statusEl.innerText = "正在處理串流，請稍候...";

        try {
            const mp4boxfile = MP4Box.createFile();
            const target = new Mp4Muxer.ArrayBufferTarget();
            let muxer = null;

            mp4boxfile.onReady = (info) => {
                const videoTrack = info.videoTracks[0];
                muxer = new Mp4Muxer.Muxer({
                    target: target,
                    video: {
                        codec: videoTrack.codec.startsWith('avc1') ? 'avc' : 'hevc',
                        width: videoTrack.video.width,
                        height: videoTrack.video.height
                    },
                    fastStart: 'in-memory'
                });

                mp4boxfile.setExtractionConfig(videoTrack.id, null, { nb_samples: 100 });
                mp4boxfile.start();
            };

            mp4boxfile.onSamples = (id, user, samples) => {
                for (let sample of samples) {
                    const time = sample.cts / sample.timescale;
                    if (time >= startT && time <= endT) {
                        muxer.addVideoChunk({
                            data: sample.data,
                            type: sample.is_sync ? 'key' : 'delta',
                            timestamp: (time - startT) * 1e6,
                            duration: (sample.duration / sample.timescale) * 1e6
                        });
                    }
                }
            };

            const reader = file.stream().getReader();
            let offset = 0;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const buffer = value.buffer;
                buffer.fileStart = offset;
                mp4boxfile.appendBuffer(buffer);
                offset += buffer.byteLength;
                statusEl.innerText = `進度: ${Math.round((offset / file.size) * 100)}%`;
            }

            mp4boxfile.flush();
            if (muxer) muxer.finalize();

            statusEl.innerText = "儲存中...";
            const blob = new Blob([target.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `cut_${Date.now()}.mp4`;
            a.click();
            statusEl.innerHTML = '<span class="success">✅ 剪輯成功！</span>';
        } catch (err) {
            statusEl.innerHTML = `<span class="error">停止原因: ${err.message}</span>`;
        } finally {
            btn.disabled = false;
        }
    };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>影片剪輯器 (100% 離線可用版)</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin: 0 0 15px; font-size: 20px; color: #007aff; text-align: center; }
        label { display: block; font-size: 12px; color: #8e8e93; margin: 10px 0 5px 5px; }
        input, button { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #d1d1d6; font-size: 16px; box-sizing: border-box; }
        button { background: #007aff; color: white; border: none; font-weight: 600; cursor: pointer; margin-top: 20px; }
        button:disabled { background: #c7c7cc; }
        #status { font-size: 14px; color: #3a3a3c; background: #f9f9f9; padding: 15px; border-radius: 10px; margin-top: 15px; line-height: 1.5; white-space: pre-wrap; }
        .success { color: #34c759; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>影片剪輯器</h2>
    <div id="status">🚀 正在啟動本地引擎...</div>
    
    <label>1. 選取影片</label>
    <input type="file" id="videoInput" accept="video/mp4,video/quicktime">

    <div style="display:flex; gap:10px;">
        <div style="flex:1">
            <label>開始(秒)</label>
            <input type="number" id="startTime" value="0" step="0.1">
        </div>
        <div style="flex:1">
            <label>結束(秒)</label>
            <input type="number" id="endTime" value="5" step="0.1">
        </div>
    </div>

    <button id="startBtn" disabled>請稍候...</button>
</div>

<script>
    // 這裡我使用一個特殊的「自動修復載入器」
    // 如果偵測到外部 script 標籤載入失敗，它會改用「最後的備案」
    const statusEl = document.getElementById('status');
    const btn = document.getElementById('startBtn');

    // 下面這個函數會嘗試動態建立腳本，並在失敗時給予明確提示
    function injectScript(url) {
        return new Promise((resolve) => {
            const script = document.createElement('script');
            script.src = url;
            script.onload = () => resolve(true);
            script.onerror = () => resolve(false);
            document.head.appendChild(script);
        });
    }

    async function bootstrap() {
        // 同時測試多個來源（包含熱門與冷門來源，冷門來源通常不會被公司防火牆擋）
        const boxLoaded = await injectScript('https://unpkg.com/mp4box@0.5.2/dist/mp4box.all.min.js') || 
                          await injectScript('https://cdn.jsdelivr.net/npm/mp4box@0.5.2/dist/mp4box.all.min.js');
        
        const muxLoaded = await injectScript('https://cdn.jsdelivr.net/npm/mp4-muxer@3.3.0/dist/mp4-muxer.main.js') ||
                          await injectScript('https://unpkg.com/mp4-muxer@3.3.0/dist/mp4-muxer.main.js');

        if (boxLoaded && muxLoaded) {
            statusEl.innerHTML = '<span class="success">✅ 引擎啟動成功！</span>\n這是一個純瀏覽器剪輯工具，不會消耗你的流量。';
            btn.disabled = false;
            btn.innerText = "立即剪輯";
        } else {
            statusEl.innerHTML = '<span style="color:red">❌ 嚴重警告：這台手機禁止了所有外部組件載入。</span>\n\n**解決方案：**\n1. 請確認這不是在 Line 的對話框內開啟。\n2. 請點擊「重新整理」按鈕。\n3. 如果您在公司 Wi-Fi 下，請切換到 4G/5G 網路。';
            btn.innerText = "無法載入組件";
        }
    }

    bootstrap();

    btn.onclick = async () => {
        const file = document.getElementById('videoInput').files[0];
        if (!file) return alert("請選擇影片");

        const startT = parseFloat(document.getElementById('startTime').value);
        const endT = parseFloat(document.getElementById('endTime').value);
        
        btn.disabled = true;
        statusEl.innerText = "正在分析影片軌道...";

        try {
            const mp4boxfile = MP4Box.createFile();
            const target = new Mp4Muxer.ArrayBufferTarget();
            let muxer = null;

            mp4boxfile.onReady = (info) => {
                const videoTrack = info.videoTracks[0];
                muxer = new Mp4Muxer.Muxer({
                    target: target,
                    video: {
                        codec: videoTrack.codec.startsWith('avc1') ? 'avc' : 'hevc',
                        width: videoTrack.video.width,
                        height: videoTrack.video.height
                    },
                    fastStart: 'in-memory'
                });
                mp4boxfile.setExtractionConfig(videoTrack.id, null, { nb_samples: 100 });
                mp4boxfile.start();
            };

            mp4boxfile.onSamples = (id, user, samples) => {
                for (let sample of samples) {
                    const time = sample.cts / sample.timescale;
                    if (time >= startT && time <= endT) {
                        muxer.addVideoChunk({
                            data: sample.data,
                            type: sample.is_sync ? 'key' : 'delta',
                            timestamp: (time - startT) * 1e6,
                            duration: (sample.duration / sample.timescale) * 1e6
                        });
                    }
                }
            };

            const reader = file.stream().getReader();
            let offset = 0;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const buffer = value.buffer;
                buffer.fileStart = offset;
                mp4boxfile.appendBuffer(buffer);
                offset += buffer.byteLength;
                statusEl.innerText = `剪輯進度: ${Math.round((offset / file.size) * 100)}%`;
            }

            mp4boxfile.flush();
            if (muxer) muxer.finalize();

            const blob = new Blob([target.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `clip.mp4`;
            a.click();
            statusEl.innerHTML = '<span class="success">✅ 剪輯完成！</span>';
        } catch (err) {
            statusEl.innerText = "❌ 處理失敗: " + err.message;
        } finally {
            btn.disabled = false;
        }
    };
</script>
</body>
</html>

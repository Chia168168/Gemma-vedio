<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Frame Player">
<meta name="theme-color" content="#0a0a0c">
<title>影片播放器</title>
<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mp4box@0.5.2/dist/mp4box.all.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;600&display=swap');

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
–accent: #c8ff47;
–accent2: #47d4ff;
–text: #f0f0f4;
–muted: #888899;
}

html, body {
background: #000;
color: var(–text);
font-family: ‘Space Grotesk’, sans-serif;
height: 100%;
overflow: hidden;
position: fixed;
width: 100%;
}

/* ══ UPLOAD SCREEN ══ */
#upload-screen {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
height: 100dvh;
gap: 24px;
padding: 32px;
background: #0a0a0c;
}
.logo {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
letter-spacing: 0.3em;
color: var(–muted);
text-transform: uppercase;
}
.upload-zone {
width: 100%; max-width: 340px;
aspect-ratio: 16/10;
border: 1.5px dashed rgba(200,255,71,0.3);
border-radius: 16px;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
gap: 14px;
background: linear-gradient(135deg, rgba(200,255,71,0.03), rgba(71,212,255,0.03));
position: relative; overflow: hidden; cursor: pointer;
transition: border-color 0.2s, background 0.2s;
}
.upload-zone:active { border-color: var(–accent); background: rgba(200,255,71,0.07); }
.upload-zone::before {
content: ‘’; position: absolute; inset: 0;
background: radial-gradient(ellipse at 50% 120%, rgba(200,255,71,0.08) 0%, transparent 60%);
pointer-events: none;
}
.upload-icon {
width: 56px; height: 56px; border-radius: 14px;
background: rgba(200,255,71,0.1);
display: flex; align-items: center; justify-content: center;
}
.upload-icon svg { width: 28px; height: 28px; stroke: var(–accent); }
.upload-text { font-size: 15px; font-weight: 600; }
.upload-sub { font-size: 12px; color: var(–muted); font-family: ‘DM Mono’, monospace; }
#file-input {
position: absolute; inset: 0; width: 100%; height: 100%;
opacity: 0; cursor: pointer; z-index: 10; font-size: 16px;
}

/* ══ PLAYER SCREEN — true fullscreen ══ */
#player-screen {
display: none;
position: fixed; inset: 0;
background: #000;
}

#video-container {
position: absolute; inset: 0;
display: flex; align-items: center; justify-content: center;
background: #000;
overflow: hidden;
touch-action: none;
}
#video {
width: 100%; height: 100%;
display: block; object-fit: contain;
transform-origin: center center;
transition: none;
will-change: transform;
}

/* Tap zone over video */
#tap-overlay {
position: absolute; inset: 0;
z-index: 5; cursor: pointer;
}

/* ── Time info top-right ── */
#time-overlay {
position: absolute;
top: max(env(safe-area-inset-top, 0px), 8px);
right: 12px;
margin-top: 8px;
background: transparent;
padding: 5px 10px;
font-family: ‘DM Mono’, monospace;
font-size: 11px; color: rgba(255,255,255,0.75);
letter-spacing: 0.05em;
pointer-events: none;
line-height: 1.7; text-align: right;
z-index: 20;
transition: opacity 0.3s;
}
#time-display { color: rgba(255,255,255,0.85); }
#frame-display { color: rgba(255,255,255,0.5); font-size: 10px; }
#time-overlay.hidden { opacity: 0; }

/* ── Mini bar (visible when panel hidden) ── */
#mini-bar {
position: absolute;
bottom: max(env(safe-area-inset-bottom, 0px), 10px);
left: 0; right: 0;
z-index: 40;
display: none;
align-items: center;
justify-content: space-around;
background: transparent;
border: none;
padding: 6px 24px;
}
#mini-bar.show { display: flex; }

.mini-btn {
background: transparent;
border: none;
border-radius: 50%;
width: 52px; height: 52px;
display: flex; align-items: center; justify-content: center;
cursor: pointer;
flex-shrink: 0;
opacity: 0.7;
}
.mini-btn svg { width: 24px; height: 24px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.mini-btn:active { opacity: 1; transform: scale(0.88); }

#mini-play-btn { opacity: 0.85; }
#mini-play-btn svg { stroke: #fff; width: 28px; height: 28px; }

.mini-divider { display: none; }

#mini-expand {
opacity: 0.35;
font-size: 16px;
color: #fff;
padding: 0;
width: 44px; height: 44px;
display: flex; align-items: center; justify-content: center;
background: transparent;
border: none;
cursor: pointer;
line-height: 1;
flex-shrink: 0;
}

/* ══ FLOATING CONTROLS PANEL ══ */
#controls {
position: absolute; left: 0; right: 0; bottom: 0;
z-index: 30;
background: transparent;
padding-top: 32px;
padding-bottom: max(env(safe-area-inset-bottom, 0px), 6px);
transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
}
#controls.hidden {
transform: translateY(100%);
opacity: 0;
pointer-events: none;
}

/* Hide chevron pill at top of panel */
#hide-pill {
display: flex; justify-content: center;
margin-bottom: 2px;
}
#hide-pill button {
background: transparent;
border: none; border-radius: 100px;
padding: 3px 22px; cursor: pointer;
color: rgba(255,255,255,0.38); font-size: 16px; line-height: 1.3;
}

/* FPS row */
#fps-row {
display: flex; align-items: center;
padding: 6px 12px 8px;
border-bottom: none;
}
.fps-btns {
display: flex; gap: 6px; flex: 1;
overflow-x: auto; -webkit-overflow-scrolling: touch;
scrollbar-width: none;
}
.fps-btns::-webkit-scrollbar { display: none; }
.fps-btn {
flex-shrink: 0; padding: 5px 10px;
border-radius: 100px; border: 1.5px solid rgba(255,255,255,0.25);
background: transparent; color: rgba(255,255,255,0.75);
font-family: ‘DM Mono’, monospace; font-size: 13px;
cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.fps-btn.active {
background: transparent;
border-color: var(–accent2);
color: var(–accent2); font-weight: 500;
}
.fps-btn:active { opacity: 0.7; transform: scale(0.95); }

/* Speed row */
#speed-row {
display: flex; align-items: center;
padding: 6px 12px 8px;
border-bottom: none;
}
.speed-label {
font-size: 11px; font-family: ‘DM Mono’, monospace;
color: rgba(255,255,255,0.5); letter-spacing: 0.2em;
text-transform: uppercase; margin-right: 10px; white-space: nowrap;
}
.speed-btns {
display: flex; gap: 6px; flex: 1;
overflow-x: auto; -webkit-overflow-scrolling: touch;
scrollbar-width: none;
}
.speed-btns::-webkit-scrollbar { display: none; }
.speed-btn {
flex-shrink: 0; padding: 5px 11px;
border-radius: 100px; border: 1.5px solid rgba(255,255,255,0.25);
background: transparent; color: rgba(255,255,255,0.75);
font-family: ‘DM Mono’, monospace; font-size: 13px;
cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.speed-btn.active {
background: transparent; border-color: var(–accent);
color: var(–accent); font-weight: 500;
}
.speed-btn:active { opacity: 0.7; transform: scale(0.95); }

/* Playback row */
#playback-row {
display: flex; align-items: center; justify-content: center;
gap: 8px; padding: 10px 12px;
border-bottom: none;
}
.ctrl-btn {
display: flex; flex-direction: column;
align-items: center; justify-content: center;
gap: 3px;
background: transparent;
border: none;
border-radius: 12px; padding: 10px 12px;
cursor: pointer; transition: all 0.15s;
flex: 1; max-width: 72px; min-height: 54px;
}
.ctrl-btn svg { width: 22px; height: 22px; stroke: rgba(255,255,255,0.85); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.ctrl-btn span { font-size: 11px; font-family: ‘DM Mono’, monospace; color: rgba(255,255,255,0.6); letter-spacing: 0.05em; }
.ctrl-btn:active { opacity: 0.6; transform: scale(0.95); }

#play-btn {
background: transparent; border: none;
max-width: 80px; min-height: 60px;
}
#play-btn svg { stroke: #fff; width: 28px; height: 28px; }
#play-btn span { color: rgba(255,255,255,0.6); font-size: 11px; }
#play-btn:active { opacity: 0.7; transform: scale(0.95); }

.save-btn svg { stroke: rgba(255,255,255,0.85); }

/* Timeline */
#timeline-section {
padding: 8px 12px 10px;
display: flex; flex-direction: column; gap: 6px;
}
.timeline-label {
font-size: 10px; font-family: ‘DM Mono’, monospace;
color: var(–muted); letter-spacing: 0.15em; text-transform: uppercase;
display: flex; justify-content: space-between;
}
#progress-bar-wrap {
position: relative; height: 4px;
background: rgba(255,255,255,0.12);
border-radius: 2px; cursor: pointer;
}
#progress-fill {
height: 100%; background: var(–accent);
border-radius: 2px; width: 0%;
transition: width 0.08s linear;
}
#thumbnail-strip {
position: relative; height: 50px;
border-radius: 8px; overflow: hidden;
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.08);
cursor: pointer;
}
#thumb-canvas-strip {
display: flex; height: 100%; width: 100%;
position: absolute; top: 0; left: 0;
}
#thumb-canvas-strip canvas { flex-shrink: 0; height: 100%; object-fit: cover; }
#timeline-indicator {
position: absolute; top: 0; width: 2px; height: 100%;
background: var(–accent); pointer-events: none;
box-shadow: 0 0 6px var(–accent); z-index: 10;
}
#timeline-indicator::before {
content: ‘’; position: absolute; top: -4px; left: 50%;
transform: translateX(-50%);
width: 10px; height: 10px;
background: var(–accent); border-radius: 50%;
}
.thumb-loading {
color: var(–muted); font-size: 11px;
font-family: ‘DM Mono’, monospace; text-align: center; padding: 8px 0 0;
}

/* Loop range */
#loop-row {
display: flex; align-items: center; gap: 8px;
padding: 4px 12px 8px;
}
#loop-toggle {
background: transparent; border: 1.5px solid rgba(255,255,255,0.2);
border-radius: 100px; padding: 5px 12px;
color: rgba(255,255,255,0.5); font-family: ‘DM Mono’, monospace;
font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
transition: all 0.15s;
}
#loop-toggle.active {
border-color: var(–accent2); color: var(–accent2);
}
#loop-set-in, #loop-set-out {
background: transparent; border: 1.5px solid rgba(255,255,255,0.2);
border-radius: 100px; padding: 5px 10px;
color: rgba(255,255,255,0.5); font-family: ‘DM Mono’, monospace;
font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
transition: all 0.15s;
}
#loop-set-in.set { border-color: rgba(200,255,71,0.5); color: var(–accent); }
#loop-set-out.set { border-color: rgba(200,255,71,0.5); color: var(–accent); }
#loop-set-in:active, #loop-set-out:active, #loop-toggle:active, #loop-clear:active { opacity: 0.6; }

#loop-clear {
background: transparent; border: 1.5px solid rgba(255,255,255,0.2);
border-radius: 100px; padding: 5px 10px;
color: rgba(255,255,255,0.4); font-family: ‘DM Mono’, monospace;
font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
transition: all 0.15s;
}

#loop-export {
background: transparent; border: 1.5px solid rgba(200,255,71,0.3);
border-radius: 100px; padding: 5px 11px;
color: var(–accent); font-family: ‘DM Mono’, monospace;
font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
transition: all 0.15s;
}
#loop-export:active { opacity: 0.6; }
#loop-export:disabled { opacity: 0.3; cursor: not-allowed; }

#loop-convert {
background: transparent; border: 1.5px solid rgba(71,212,255,0.3);
border-radius: 100px; padding: 5px 11px;
color: var(–accent2); font-family: ‘DM Mono’, monospace;
font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
transition: all 0.15s;
}
#loop-convert:active { opacity: 0.6; }

#export-format {
background: transparent; border: 1.5px solid rgba(255,255,255,0.2);
border-radius: 100px; padding: 5px 8px;
color: rgba(255,255,255,0.6); font-family: ‘DM Mono’, monospace;
font-size: 12px; cursor: pointer; flex-shrink: 0;
-webkit-appearance: none; appearance: none;
text-align: center;
}
#export-format option { background: #1a1a1a; color: #fff; }

/* Export progress overlay */
#export-overlay {
display: none;
position: fixed; inset: 0; z-index: 99999;
background: rgba(0,0,0,0.85);
flex-direction: column; align-items: center; justify-content: center;
gap: 16px;
}
#export-overlay.show { display: flex; }
#export-overlay p {
color: #fff; font-family: ‘DM Mono’, monospace;
font-size: 14px; text-align: center; line-height: 1.6;
padding: 0 24px;
}
#export-progress-bar {
width: 240px; height: 6px;
background: rgba(255,255,255,0.15); border-radius: 3px; overflow: hidden;
}
#export-progress-fill {
height: 100%; background: var(–accent);
border-radius: 3px; width: 0%;
transition: width 0.3s;
}
#export-cancel {
background: transparent; border: 1.5px solid rgba(255,255,255,0.25);
border-radius: 100px; padding: 7px 20px;
color: rgba(255,255,255,0.6); font-family: ‘DM Mono’, monospace;
font-size: 13px; cursor: pointer;
}

#loop-range-display {
flex: 1; font-family: ‘DM Mono’, monospace; font-size: 10px;
color: rgba(255,255,255,0.35); text-align: right; white-space: nowrap;
overflow: hidden; text-overflow: ellipsis;
}

/* Range overlay on thumbnail strip */
#loop-range-overlay {
position: absolute; top: 0; height: 100%;
background: rgba(200,255,71,0.15);
border-left: 2px solid var(–accent);
border-right: 2px solid var(–accent);
pointer-events: none; z-index: 8;
display: none;
}
#loop-range-overlay.show { display: block; }

/* Toast */
#toast {
position: fixed; bottom: 50px; left: 50%;
transform: translateX(-50%) translateY(14px);
background: rgba(15,15,22,0.92);
backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
border: 1px solid rgba(255,255,255,0.1);
color: var(–text); padding: 9px 18px;
border-radius: 100px; font-size: 13px;
font-family: ‘DM Mono’, monospace;
opacity: 0; pointer-events: none;
transition: all 0.25s; z-index: 9999; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

</head>

// ── Pinch zoom, pan & tap ──
(function() {
  const container = document.getElementById('video-container');
  const tapOverlay = document.getElementById('tap-overlay');
  const vid = document.getElementById('video');

  let scale = 1, posX = 0, posY = 0;
  let startScale = 1, startPosX = 0, startPosY = 0;
  let panStartX = 0, panStartY = 0;
  let lastTapTime = 0;
  let didMove = false;
  const MIN_SCALE = 1, MAX_SCALE = 8;

  function applyTransform(animate) {
    vid.style.transition = animate ? 'transform 0.25s ease' : 'none';
    vid.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
  }

  function clampPos() {
    if (scale <= 1) { posX = 0; posY = 0; return; }
    const maxX = (container.offsetWidth  * (scale - 1)) / 2;
    const maxY = (container.offsetHeight * (scale - 1)) / 2;
    posX = Math.max(-maxX, Math.min(maxX, posX));
    posY = Math.max(-maxY, Math.min(maxY, posY));
  }

  function midpoint(t1, t2) {
    return { x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 };
  }
  function dist(t1, t2) {
    const dx = t1.clientX - t2.clientX, dy = t1.clientY - t2.clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  tapOverlay.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      e.preventDefault();
      didMove = true;
      startScale = scale;
      startPosX = posX; startPosY = posY;
      const mid = midpoint(e.touches[0], e.touches[1]);
      panStartX = mid.x; panStartY = mid.y;
      container._startDist = dist(e.touches[0], e.touches[1]);
    } else if (e.touches.length === 1) {
      didMove = false;
      panStartX = e.touches[0].clientX - posX;
      panStartY = e.touches[0].clientY - posY;
      if (scale > 1) e.preventDefault();
    }
  }, { passive: false });

  tapOverlay.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      e.preventDefault();
      didMove = true;
      const d = dist(e.touches[0], e.touches[1]);
      const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, startScale * d / container._startDist));
      const mid = midpoint(e.touches[0], e.touches[1]);
      const rect = container.getBoundingClientRect();
      const cx = mid.x - rect.left - rect.width  / 2;
      const cy = mid.y - rect.top  - rect.height / 2;
      const prevCx = panStartX - rect.left - rect.width  / 2;
      const prevCy = panStartY - rect.top  - rect.height / 2;
      posX = cx - (prevCx - startPosX) * (newScale / startScale);
      posY = cy - (prevCy - startPosY) * (newScale / startScale);
      scale = newScale;
      clampPos();
      applyTransform(false);
    } else if (e.touches.length === 1 && scale > 1) {
      e.preventDefault();
      const dx = e.touches[0].clientX - (panStartX + posX);
      const dy = e.touches[0].clientY - (panStartY + posY);
      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) didMove = true;
      posX = e.touches[0].clientX - panStartX;
      posY = e.touches[0].clientY - panStartY;
      clampPos();
      applyTransform(false);
    }
  }, { passive: false });

  tapOverlay.addEventListener('touchend', e => {
    if (e.touches.length < 2 && scale < 1.05) {
      scale = 1; posX = 0; posY = 0; applyTransform(true);
    }

    if (e.touches.length === 0) {
      const now = Date.now();
      if (!didMove) {
        // Double-tap: reset zoom
        if (now - lastTapTime < 300) {
          scale = 1; posX = 0; posY = 0; applyTransform(true);
        } else {
          // Single tap: play/pause
          togglePlay();
        }
      }
      lastTapTime = now;
      didMove = false;
    }
  }, { passive: true });
})();

    metaFired = true;
    onMetaLoaded();

  // Remove any previous listeners before adding new ones
  video.removeEventListener('loadedmetadata', onMeta);
  video.addEventListener('loadedmetadata', onMeta, { once: true });
  video.addEventListener('canplaythrough', function probe() {
    video.removeEventListener('canplaythrough', probe);
    if (!metaFired && video.duration > 0) onMeta();
  }, { once: true });

  // Stall detection — if nothing fires in 10s, show error
  const stallTimer = setTimeout(() => {
    if (!metaFired) {
      if (video.duration > 0) { onMeta(); return; }
      thumbStatus.textContent = '載入逾時，請重新選擇';
      showToast('載入逾時');
    }
  }, 10000);

  // Clear stall timer once loaded
  video.addEventListener('loadedmetadata', () => clearTimeout(stallTimer), { once: true });

  // Set src once, then load once
  video.src = currentBlobUrl;
  video.load();
}

async function parseFPS(file) {
  const fileSize = file.size;
  const TAIL = Math.min(8 * 1024 * 1024, fileSize);
  const HEAD = Math.min(4 * 1024 * 1024, fileSize);

  // Try head first (moov at front for some MP4)
  const headBuf = await readFileSlice(file, 0, HEAD);
  let result = scanBufferForFPS(headBuf, 0);
  if (result) return result;

  // Try tail (iPhone MOV: moov at end)
  if (fileSize > HEAD) {
    const tailStart = fileSize - TAIL;
    const tailBuf = await readFileSlice(file, tailStart, fileSize);
    result = scanBufferForFPS(tailBuf, tailStart);
    if (result) return result;
  }

  return null;
}

function scanBufferForFPS(buf, bufStart) {
  const view = new DataView(buf);
  const len = buf.byteLength;

  for (let i = 0; i + 8 <= len; i++) {
    if (view.getUint8(i)   === 0x6D &&
        view.getUint8(i+1) === 0x6F &&
        view.getUint8(i+2) === 0x6F &&
        view.getUint8(i+3) === 0x76) {
      if (i < 4) continue;
      const moovSize = readU32(view, i - 4);
      const moovEnd = Math.min(i - 4 + moovSize, len);
      const result = parseMoov(view, i + 4, moovEnd);
      if (result) return result;
    }
  }
  return null;
}

function parseMoov(view, start, end) {
  let off = start;
  while (off + 8 <= end) {
    const size = readU32(view, off);
    const name = read4cc(view, off + 4);
    if (size < 8) break;
    const childEnd = Math.min(off + size, end);
    if (name === 'trak') {
      const result = parseTrak(view, off + 8, childEnd);
      if (result) return result;
    }
    off += size;
  }
  return null;
}

function parseTrak(view, start, end) {
  let timescale = null, sampleDelta = null, isVideo = false;

  function walk(s, e) {
    let off = s;
    while (off + 8 <= e) {
      const size = readU32(view, off);
      const name = read4cc(view, off + 4);
      if (size < 8) break;
      const ce = Math.min(off + size, e);
      if (name === 'mdia' || name === 'minf' || name === 'stbl') {
        walk(off + 8, ce);
      } else if (name === 'mdhd') {
        timescale = parseMdhd(view, off + 8, ce);
      } else if (name === 'hdlr') {
        const h = parseHdlr(view, off + 8, ce);
        if (h) isVideo = true;
      } else if (name === 'stts') {
        sampleDelta = parseStts(view, off + 8, ce);
      }
      off += size;
    }
  }
  walk(start, end);

  if (isVideo && timescale && sampleDelta && sampleDelta > 0) {
    return timescale / sampleDelta;
  }
  return null;
}

function parseMdhd(view, start, end) {
  if (start + 4 > end) return null;
  const ver = view.getUint8(start);
  // version 0: [version(1)+flags(3)] + creation(4) + modification(4) + timescale(4)
  // version 1: [version(1)+flags(3)] + creation(8) + modification(8) + timescale(4)
  const tsOff = ver === 1 ? start + 4 + 8 + 8 : start + 4 + 4 + 4;
  if (tsOff + 4 > end) return null;
  return readU32(view, tsOff);
}

function parseHdlr(view, start, end) {
  if (start + 12 > end) return false;
  const h = read4cc(view, start + 8);
  return h === 'vide';
}

function parseStts(view, start, end) {
  // [version(1)+flags(3)] + entry_count(4) + [count(4)+delta(4)...]
  if (start + 8 > end) return null;
  const entryCount = readU32(view, start + 4);
  if (!entryCount) return null;
  // Pick the entry with the most samples (dominant frame interval)
  let bestDelta = 0, bestCount = 0;
  for (let i = 0; i < entryCount && i < 64; i++) {
    const base = start + 8 + i * 8;
    if (base + 8 > end) break;
    const count = readU32(view, base);
    const delta = readU32(view, base + 4);
    if (delta > 0 && count > bestCount) { bestCount = count; bestDelta = delta; }
  }
  return bestDelta || null;
}

function readU32(view, off) { return view.getUint32(off, false); }
function read4cc(view, off) {
  let s = '';
  for (let i = 0; i < 4; i++) s += String.fromCharCode(view.getUint8(off + i));
  return s;
}

function snapToCommonFPS(raw) {
  const common = [23.976, 24, 25, 29.97, 30, 48, 50, 59.94, 60, 90, 100, 119.88, 120, 240];
  let best = common[0], bestDiff = Infinity;
  for (const c of common) {
    const d = Math.abs(raw - c);
    if (d < bestDiff) { bestDiff = d; best = c; }
  }
  return bestDiff / raw < 0.06 ? best : Math.round(raw * 10) / 10;
}

function readFileSlice(file, start, end) {
  return new Promise((resolve, reject) => {
    if (start >= end) { resolve(new ArrayBuffer(0)); return; }
    const r = new FileReader();
    r.onload = e => resolve(e.target.result);
    r.onerror = e => reject(new Error('FileReader 錯誤：' + (r.error?.message || '讀取失敗')));
    r.readAsArrayBuffer(file.slice(start, end));
  });
}

// ── Byte-range extraction: only read the bytes needed for the clip ──
async function extractClipBlob(file, clipIn, clipOut) {
  const SCAN = Math.min(10 * 1024 * 1024, file.size);

  // 1. Find ftyp + moov
  let ftypBytes = null, moovBytes = null;
  async function scanBuf(ab) {
    const b = new Uint8Array(ab); let off = 0;
    while (off + 8 <= b.length) {
      const sz = (b[off]<<24|b[off+1]<<16|b[off+2]<<8|b[off+3])>>>0;
      const nm = String.fromCharCode(b[off+4],b[off+5],b[off+6],b[off+7]);
      if (sz < 8) break;
      if (nm === 'ftyp') ftypBytes = b.slice(off, off+sz);
      if (nm === 'moov') { moovBytes = b.slice(off, Math.min(off+sz, b.length)); return; }
      off += sz;
    }
  }
  await scanBuf(await readFileSlice(file, 0, SCAN));
  if (!moovBytes && file.size > SCAN) {
    const tail = new Uint8Array(await readFileSlice(file, file.size-SCAN, file.size));
    for (let i = 4; i+8 <= tail.length; i++) {
      if (String.fromCharCode(tail[i],tail[i+1],tail[i+2],tail[i+3]) === 'moov') {
        const sz = (tail[i-4]<<24|tail[i-3]<<16|tail[i-2]<<8|tail[i-1])>>>0;
        moovBytes = tail.slice(i-4, Math.min(i-4+sz, tail.length));
        break;
      }
    }
  }
  if (!moovBytes) throw new Error('找不到 moov');

  // 2. Parse video track
  const vt = parseVideoTrackFull(moovBytes.buffer);
  if (!vt || !vt.stco.length) throw new Error('找不到視訊軌');
  const { timescale, stts, stsc, stco, stsz, fixedSampleSize } = vt;
  const TC = stco.length;

  function u32(b,o){return(b[o]<<24|b[o+1]<<16|b[o+2]<<8|b[o+3])>>>0;}
  function w32(b,o,v){v>>>=0;b[o]=v>>>24;b[o+1]=(v>>>16)&255;b[o+2]=(v>>>8)&255;b[o+3]=v&255;}

  // 3. Helpers
  function spc(ci) {
    let r=1;
    for (let i=stsc.length-1;i>=0;i--)
      if (ci>=stsc[i].firstChunk-1){r=stsc[i].samplesPerChunk;break;}
    return r;
  }
  const css=new Array(TC);{let s=0;for(let c=0;c<TC;c++){css[c]=s;s+=spc(c);}}
  const TS=css[TC-1]+spc(TC-1);

  function time2s(sec) {
    const tgt=Math.round(sec*timescale);let s=0,t=0;
    for(const e of stts){
      if(!e.delta){s+=e.count;continue;}
      const end=t+e.count*e.delta;
      if(end>tgt)return s+Math.floor((tgt-t)/e.delta);
      t=end;s+=e.count;
    }
    return Math.min(s,TS);
  }
  function sampleSz(si){return fixedSampleSize>0?fixedSampleSize:(si<stsz.length?stsz[si]:0);}

  // 4. Find chunk range
  const s0=time2s(clipIn), s1=Math.min(TS,time2s(clipOut));
  let c0=0;for(let c=0;c<TC-1;c++){if(css[c+1]>s0)break;c0=c+1;}c0=Math.min(c0,TC-1);
  let c1=c0;for(let c=c0;c<TC;c++){c1=c;if(css[c]+spc(c)>=s1)break;}

  // 5. Byte range
  const byteStart=stco[c0];
  let byteEnd=c1+1<TC?stco[c1+1]:stco[c1]+(()=>{let b=0,n=spc(c1);for(let i=0;i<n;i++)b+=sampleSz(css[c1]+i);return b;})();
  byteEnd=Math.min(byteEnd,file.size);

  const mdatPayload=new Uint8Array(await readFileSlice(file,byteStart,byteEnd));

  // 6. Simple stco patch: adjust all offsets by delta
  // New layout: [ftyp][moov][mdat(8)][payload]
  const ftypSz = ftypBytes ? ftypBytes.length : 0;
  const moovSz = moovBytes.length;
  const delta = (ftypSz + moovSz + 8) - byteStart;

  // Patch a copy of moov
  const patchedMoov = moovBytes.slice();
  function patchStco(b, s, e) {
    let off=s;
    while(off+8<=e){
      const sz=u32(b,off);
      const nm=String.fromCharCode(b[off+4],b[off+5],b[off+6],b[off+7]);
      if(sz<8)break;
      const ce=Math.min(off+sz,e);
      if(['trak','mdia','minf','stbl'].includes(nm)) patchStco(b,off+8,ce);
      else if(nm==='stco'){
        const cnt=u32(b,off+12);
        for(let i=0;i<cnt;i++){
          const p=off+16+i*4;
          if(p+4>b.length)break;
          const orig=u32(b,p);
          // Only adjust offsets that fall within our byte range
          if(orig>=byteStart&&orig<=byteEnd) w32(b,p,orig+delta);
        }
      }
      off+=sz;
    }
  }
  patchStco(patchedMoov, 8, patchedMoov.length);

  // 7. mdat header
  const mdatHdr=new Uint8Array(8);
  w32(mdatHdr,0,mdatPayload.length+8);
  mdatHdr[4]=0x6D;mdatHdr[5]=0x64;mdatHdr[6]=0x61;mdatHdr[7]=0x74;

  const parts=[];
  if(ftypBytes)parts.push(ftypBytes);
  parts.push(patchedMoov,mdatHdr,mdatPayload);

  const mime=file.type||(file.name.toLowerCase().endsWith('.mov')?'video/quicktime':'video/mp4');
  return new Blob(parts,{type:mime});
}

function parseVideoTrackFull(moovBuf) {
  const view = new DataView(moovBuf);
  let off = 8;
  while (off + 8 <= moovBuf.byteLength) {
    const sz = readU32(view, off), nm = read4cc(view, off + 4);
    if (sz < 8) break;
    if (nm === 'trak') {
      const t = parseTrakFull(view, off + 8, Math.min(off + sz, moovBuf.byteLength));
      if (t && t.isVideo) return t;
    }
    off += sz;
  }
  return null;
}

function parseTrakFull(view, start, end) {
  let timescale = null, isVideo = false;
  let stts = [], stsc = [], stco = [], stsz = [], stss = [], ctts = [], fixedSampleSize = 0;

  function walk(s, e) {
    let off = s;
    while (off + 8 <= e) {
      const sz = readU32(view, off), nm = read4cc(view, off + 4);
      if (sz < 8) break;
      const cs = off + 8, ce = Math.min(off + sz, e);
      if (['mdia','minf','stbl'].includes(nm)) { walk(cs, ce); }
      else if (nm === 'mdhd') { timescale = parseMdhd(view, cs, ce); }
      else if (nm === 'hdlr') { if (parseHdlr(view, cs, ce)) isVideo = true; }
      else if (nm === 'stts') {
        const cnt = readU32(view, cs + 4);
        for (let i = 0; i < cnt && cs + 8 + i*8 + 7 < ce; i++)
          stts.push({ count: readU32(view, cs+8+i*8), delta: readU32(view, cs+8+i*8+4) });
      }
      else if (nm === 'stsc') {
        const cnt = readU32(view, cs + 4);
        for (let i = 0; i < cnt && cs + 8 + i*12 + 11 < ce; i++)
          stsc.push({ firstChunk: readU32(view, cs+8+i*12), samplesPerChunk: readU32(view, cs+8+i*12+4) });
      }
      else if (nm === 'stco') {
        const cnt = readU32(view, cs + 4);
        for (let i = 0; i < cnt && cs + 8 + i*4 + 3 < ce; i++)
          stco.push(readU32(view, cs+8+i*4));
      }
      else if (nm === 'co64') {
        const cnt = readU32(view, cs + 4);
        for (let i = 0; i < cnt && cs + 8 + i*8 + 7 < ce; i++)
          stco.push(readU32(view, cs+8+i*8) * 0x100000000 + readU32(view, cs+8+i*8+4));
      }
      else if (nm === 'stsz') {
        fixedSampleSize = readU32(view, cs + 4);
        if (!fixedSampleSize) {
          const cnt = readU32(view, cs + 8);
          for (let i = 0; i < cnt && cs + 12 + i*4 + 3 < ce; i++)
            stsz.push(readU32(view, cs+12+i*4));
        }
      }
      else if (nm === 'stss') {
        const cnt = readU32(view, cs + 4);
        for (let i = 0; i < cnt && cs + 8 + i*4 + 3 < ce; i++)
          stss.push(readU32(view, cs+8+i*4) - 1); // convert to 0-based
      }
      else if (nm === 'ctts') {
        const cnt = readU32(view, cs + 4);
        for (let i = 0; i < cnt && cs + 8 + i*8 + 7 < ce; i++)
          ctts.push({ count: readU32(view, cs+8+i*8), offset: readU32(view, cs+8+i*8+4) });
      }
      off += sz;
    }
  }
  walk(start, end);
  if (!isVideo || !timescale) return null;
  return { timescale, stts, stsc, stco, stsz, stss, ctts, fixedSampleSize, isVideo };
}

let isSeeking = false;

// ── WebCodecs + mp4-muxer remux (no re-encode, proper MP4 structure) ──
async function remuxClip(file, clipIn, clipOut) {
  const SCAN = Math.min(10 * 1024 * 1024, file.size);

  function u32(b,o){return(b[o]<<24|b[o+1]<<16|b[o+2]<<8|b[o+3])>>>0;}

  // 1. Find moov
  let moovBytes = null;
  async function scanBuf(ab) {
    const b = new Uint8Array(ab); let off = 0;
    while (off+8 <= b.length) {
      const sz = u32(b,off), nm = String.fromCharCode(b[off+4],b[off+5],b[off+6],b[off+7]);
      if (sz < 8) break;
      if (nm === 'moov') { moovBytes = b.slice(off, Math.min(off+sz, b.length)); return; }
      off += sz;
    }
  }
  await scanBuf(await readFileSlice(file, 0, SCAN));
  if (!moovBytes && file.size > SCAN) {
    const tail = new Uint8Array(await readFileSlice(file, file.size-SCAN, file.size));
    for (let i = 4; i+8 <= tail.length; i++) {
      if (String.fromCharCode(tail[i],tail[i+1],tail[i+2],tail[i+3]) === 'moov') {
        moovBytes = tail.slice(i-4, Math.min(i-4+u32(tail,i-4), tail.length)); break;
      }
    }
  }
  if (!moovBytes) throw new Error('找不到 moov');

  // 2. Parse all track tables
  const vt = parseVideoTrackFull(moovBytes.buffer);
  if (!vt || !vt.stco.length) throw new Error('找不到視訊軌');
  const { timescale, stts, stsc, stco, stsz, stss, ctts, fixedSampleSize } = vt;
  const TC = stco.length;

  function spc(ci) {
    let r=1; for(let i=stsc.length-1;i>=0;i--) if(ci>=stsc[i].firstChunk-1){r=stsc[i].samplesPerChunk;break;} return r;
  }
  const css=new Array(TC); {let s=0; for(let c=0;c<TC;c++){css[c]=s;s+=spc(c);}}
  const TS=css[TC-1]+spc(TC-1);

  function time2s(sec) {
    const tgt=Math.round(sec*timescale); let s=0,t=0;
    for(const e of stts){if(!e.delta){s+=e.count;continue;} const end=t+e.count*e.delta; if(end>tgt)return s+Math.floor((tgt-t)/e.delta); t=end;s+=e.count;}
    return Math.min(s,TS);
  }
  function sampleSz(si){return fixedSampleSize>0?fixedSampleSize:(si<stsz.length?stsz[si]:0);}

  // Snap start to nearest keyframe
  const stssSet = new Set(stss); // 0-based
  let s0 = time2s(clipIn);
  if (stss.length) {
    let kf = stss[0];
    for (const k of stss) { if (k <= s0) kf = k; else break; }
    s0 = kf;
  }
  const s1 = Math.min(TS, time2s(clipOut));

  // Build ctts lookup: sample → composition offset
  const cttsMap = [];
  if (ctts && ctts.length) {
    let si = 0;
    for (const e of ctts) {
      for (let i = 0; i < e.count; i++) cttsMap[si++] = e.offset;
    }
  }

  // Build sample → chunk map
  function sampleChunk(si) {
    let s=0; for(let c=0;c<TC;c++){const n=spc(c); if(s+n>si)return{chunk:c,idx:si-s}; s+=n;} return{chunk:TC-1,idx:0};
  }
  function sampleByteOffset(si) {
    const {chunk,idx} = sampleChunk(si);
    let off = stco[chunk];
    for(let i=0;i<idx;i++) off += sampleSz(css[chunk]+i);
    return off;
  }

  // Build sample timestamps from stts
  const sampleDTS = new Array(TS);
  {let t=0,si=0; for(const e of stts){for(let i=0;i<e.count;i++){sampleDTS[si++]=t;t+=e.delta;}}}

  // 3. Collect samples for clip range
  const samples = [];
  const startDTS = sampleDTS[s0] || 0;
  for (let si = s0; si < s1; si++) {
    const byteOff = sampleByteOffset(si);
    const sz = sampleSz(si);
    const dts = sampleDTS[si] - startDTS;
    const cts = cttsMap[si] || 0;
    const pts = dts + cts;
    const isKey = stssSet.size === 0 || stssSet.has(si);
    samples.push({ byteOff, sz, dts, pts, isKey });
  }

  // 4. Read all sample bytes in one pass (sorted by byte offset)
  const sorted = [...samples].sort((a,b) => a.byteOff - b.byteOff);
  const firstByte = sorted[0].byteOff;
  const lastByte  = sorted[sorted.length-1].byteOff + sorted[sorted.length-1].sz;
  const rawBuf = new Uint8Array(await readFileSlice(file, firstByte, Math.min(lastByte, file.size)));

  // 5. Extract avcC by direct byte scan
  let avcCBytes = null;
  for (let i = 4; i + 8 <= moovBytes.length; i++) {
    if (moovBytes[i]===0x61 && moovBytes[i+1]===0x76 &&
        moovBytes[i+2]===0x63 && moovBytes[i+3]===0x43) { // 'avcC'
      const sz = u32(moovBytes, i - 4);
      if (sz >= 8 && i - 4 + sz <= moovBytes.length) {
        avcCBytes = moovBytes.slice(i + 4, i - 4 + sz); // content after size+name
        break;
      }
    }
  }

  // Build codec string from avcC: avc1.PPCCLL
  let codecStr = 'avc1.640028';
  if (avcCBytes && avcCBytes.length >= 4) {
    // avcC: configVersion(1) + profile(1) + compat(1) + level(1) + ...
    const p = avcCBytes[1].toString(16).padStart(2,'0');
    const c = avcCBytes[2].toString(16).padStart(2,'0');
    const l = avcCBytes[3].toString(16).padStart(2,'0');
    codecStr = `avc1.${p}${c}${l}`;
  }

  // 5. Mux with mp4-muxer
  const { Muxer, ArrayBufferTarget } = Mp4Muxer;
  const target = new ArrayBufferTarget();
  const muxer = new Muxer({
    target,
    video: { codec: 'avc', width: video.videoWidth, height: video.videoHeight },
    fastStart: 'in-memory',
  });

  const ticksPerUs = 1e6 / timescale;
  const frameDurUs = Math.round((1 / fps) * 1e6);
  let firstChunk = true;

  for (const s of samples) {
    const data = rawBuf.slice(s.byteOff - firstByte, s.byteOff - firstByte + s.sz);
    const chunk = new EncodedVideoChunk({
      type: s.isKey ? 'key' : 'delta',
      timestamp: Math.round(s.dts * ticksPerUs),
      duration:  frameDurUs,
      data,
    });
    let meta;
    if (firstChunk && avcCBytes) {
      firstChunk = false;
      meta = {
        decoderConfig: {
          codec: codecStr,
          description: avcCBytes.buffer.slice(avcCBytes.byteOffset, avcCBytes.byteOffset + avcCBytes.byteLength),
          codedWidth: video.videoWidth,
          codedHeight: video.videoHeight,
        }
      };
    } else if (s.pts !== s.dts) {
      meta = { compositionTimeOffset: Math.round((s.pts - s.dts) * ticksPerUs) };
    }
    firstChunk = false;
    muxer.addVideoChunk(chunk, meta);
    exportProgressF.style.width = Math.min(95, 10 + Math.round((s.dts / (sampleDTS[Math.min(s1-1, sampleDTS.length-1)] - startDTS || 1)) * 85)) + '%';
  }

  muxer.finalize();
  const { buffer } = target;
  return new Blob([buffer], { type: 'video/mp4' });
}

function seekExact(t) {
  return new Promise(resolve => {
    const clamped = Math.max(0, Math.min(duration - 0.001, t));
    if (Math.abs(video.currentTime - clamped) < 0.0001) { resolve(); return; }
    let settled = false;
    function done() {
      if (settled) return; settled = true;
      video.removeEventListener('seeked', onSeeked);
      resolve();
    }
    function onSeeked() { setTimeout(done, 30); }
    video.addEventListener('seeked', onSeeked);
    video.currentTime = clamped;
    setTimeout(done, 2000); // longer timeout for clipped files
  });
}

// ── Thumbnails ──
async function generateThumbnails() {
  thumbCanvasStrip.innerHTML = '';
  thumbStatus.style.display = 'block';
  thumbStatus.textContent = '生成縮圖中…';
  await new Promise(r => setTimeout(r, 100));

  if (!video.videoWidth || !video.duration) {
    thumbStatus.style.display = 'none'; return;
  }

  const W = thumbnailStrip.offsetWidth || 320;
  const H = thumbnailStrip.offsetHeight || 50;
  const vw = video.videoWidth || 16;
  const vh = video.videoHeight || 9;
  const aspect = vw / vh;
  const tw = Math.round(H * aspect);
  const count = Math.max(6, Math.round(W / tw));

  for (let i = 0; i < count; i++) {
    try {
      await seekExact((i / count) * duration);
      const c = document.createElement('canvas');
      c.width = tw; c.height = H;
      c.getContext('2d').drawImage(video, 0, 0, tw, H);
      c.style.cssText = `width:${tw}px;height:${H}px;flex-shrink:0;`;
      thumbCanvasStrip.appendChild(c);
    } catch(e) {}
  }

  thumbStatus.style.display = 'none';
  try { await seekExact(0); } catch(e) {}
  updateUI();
}

function setPlayIcon(on) {
  if (on) {
    playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16" fill="#fff" stroke="#fff"/><rect x="14" y="4" width="4" height="16" fill="#fff" stroke="#fff"/>';
    playLabel.textContent = '暫停';
  } else {
    playIcon.innerHTML = '<polygon fill="#fff" stroke="#fff" points="5 3 19 12 5 21 5 3"/>';
    playLabel.textContent = '播放';
  }
  syncMiniPlayIcon(on);
}

playBtn.addEventListener('click', e => { e.stopPropagation(); togglePlay(); });

function togglePlay() {
  if (frameMode) { toggleFrameMode(); hidePanel(); return; }
  if (currentSpeed === 'frame') { toggleFrameMode(); hidePanel(); return; }
  if (video.paused) {
    video.play(); isPlaying = true; setPlayIcon(true); hidePanel();
  } else {
    video.pause(); isPlaying = false; setPlayIcon(false); clearTimeout(autoHideTimer);
  }
}

// ── Frame mode ──
function stopFrameMode() {
  if (frameInterval) { clearInterval(frameInterval); frameInterval = null; }
  frameMode = false;
}
function toggleFrameMode() {
  if (frameMode) { stopFrameMode(); setPlayIcon(false); return; }
  video.pause(); isPlaying = false;
  frameMode = true; setPlayIcon(true);
  const spf = 1 / fps;
  frameInterval = setInterval(() => {
    if (!frameMode) return;
    const next = video.currentTime + spf;
    if (next >= duration) { stopFrameMode(); setPlayIcon(false); return; }
    const done = () => { video.removeEventListener('seeked', done); updateUI(); };
    video.addEventListener('seeked', done);
    video.currentTime = next;
  }, 1000);
}

video.addEventListener('timeupdate', updateUI);
video.addEventListener('ended', () => {
  isPlaying = false; setPlayIcon(false); stopFrameMode(); clearTimeout(autoHideTimer);
});

// ── Speed buttons ──
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    stopFrameMode();
    const s = btn.dataset.speed;
    if (s === 'frame') {
      video.pause(); isPlaying = false; currentSpeed = 'frame'; video.playbackRate = 1;
      toggleFrameMode();
    } else {
      currentSpeed = parseFloat(s);
      video.playbackRate = currentSpeed;
      if (!video.paused) setPlayIcon(true);
    }
    resetAutoHide();
  });
});

document.getElementById('back5-btn').addEventListener('click', e => {
  e.stopPropagation();
  stopFrameMode(); video.currentTime = Math.max(0, video.currentTime - 5);
  updateUI(); resetAutoHide();
});
document.getElementById('fwd5-btn').addEventListener('click', e => {

// ── Prev / Next frame with long-press ──
let stepFramePending = false;

function stepFrame(dir) {
  if (stepFramePending) return;
  stopFrameMode();
  isSeeking = false;
  video.pause(); isPlaying = false; setPlayIcon(false);
  const next = Math.max(0, Math.min(duration - 0.001, video.currentTime + dir / fps));
  stepFramePending = true;
  let settled = false;
  function done() {
    if (settled) return; settled = true;
    stepFramePending = false;
    video.removeEventListener('seeked', done);
    updateUI();
  }
  video.addEventListener('seeked', done);
  video.currentTime = next;
  setTimeout(done, 2000);
}
function setupLongPress(el, dir) {
  let pt = null, rt = null;
  function start(e) {
    e.preventDefault(); e.stopPropagation();
    stepFrame(dir);
    pt = setTimeout(() => { rt = setInterval(() => stepFrame(dir), 80); }, 380);
  }
  function stop() { clearTimeout(pt); clearInterval(rt); pt = null; rt = null; }
  el.addEventListener('touchstart', start, { passive: false });
  el.addEventListener('touchend', stop);
  el.addEventListener('touchcancel', stop);
  el.addEventListener('mousedown', start);
  el.addEventListener('mouseup', stop);
  el.addEventListener('mouseleave', stop);
}
setupLongPress(document.getElementById('prev-frame-btn'), -1);
setupLongPress(document.getElementById('next-frame-btn'), +1);
// Wire mini frame buttons with same long-press
setupLongPress(document.getElementById('mini-prev'), -1);
setupLongPress(document.getElementById('mini-next'), +1);

// ── Timeline scrub ──
let isScrubbing = false;
let scrubTargetTime = 0;
let scrubRaf = null;

function scrubAt(cx, commit) {
  const r = thumbnailStrip.getBoundingClientRect();
  scrubTargetTime = Math.max(0, Math.min(1, (cx - r.left) / r.width)) * duration;
  if (commit) {
    seekExact(scrubTargetTime).then(() => updateUI());
  } else {
    if (!scrubRaf) {
      scrubRaf = requestAnimationFrame(() => {
        scrubRaf = null;
        const pct = scrubTargetTime / duration;
        const indicator = document.getElementById('timeline-indicator');
        if (indicator) indicator.style.left = (pct * 100) + '%';
        if (timeDisplay) timeDisplay.textContent = formatTime(scrubTargetTime);
        const f = Math.round(scrubTargetTime * fps);
        if (frameDisplay) frameDisplay.textContent = `F: ${f}`;
      });
    }
  }
}

thumbnailStrip.addEventListener('touchstart', e => {
  e.stopPropagation(); isScrubbing = true;
  stopFrameMode(); video.pause(); isPlaying = false; setPlayIcon(false);
  scrubAt(e.touches[0].clientX, false);
}, { passive: false });
thumbnailStrip.addEventListener('touchmove', e => {
  if (!isScrubbing) return;
  e.preventDefault(); e.stopPropagation();
  scrubAt(e.touches[0].clientX, false);
}, { passive: false });
thumbnailStrip.addEventListener('touchend', e => {
  if (!isScrubbing) return;
  isScrubbing = false;
  scrubAt(e.changedTouches[0].clientX, true); // seek only on release
});
thumbnailStrip.addEventListener('touchcancel', () => {
  isScrubbing = false;
  video.currentTime = scrubTargetTime;
  updateUI();
});
thumbnailStrip.addEventListener('mousedown', e => {
  e.stopPropagation(); isScrubbing = true;
  stopFrameMode(); video.pause(); isPlaying = false; setPlayIcon(false);
  scrubAt(e.clientX, false);
});
document.addEventListener('mousemove', e => { if (isScrubbing) scrubAt(e.clientX, false); });
document.addEventListener('mouseup', e => {
  if (!isScrubbing) return;
  isScrubbing = false;
  scrubAt(e.clientX, true);
});

// ── Progress bar scrub ──
const progressWrap = document.getElementById('progress-bar-wrap');
function scrubProg(cx) {
  const r = progressWrap.getBoundingClientRect();
  video.currentTime = Math.max(0, Math.min(1, (cx - r.left) / r.width)) * duration;
  updateUI();
}
progressWrap.addEventListener('touchstart', e => {
  e.stopPropagation(); scrubProg(e.touches[0].clientX);
  stopFrameMode(); video.pause(); isPlaying = false; setPlayIcon(false);
}, { passive: true });
progressWrap.addEventListener('touchmove', e => scrubProg(e.touches[0].clientX), { passive: true });
progressWrap.addEventListener('mousedown', e => { e.stopPropagation(); scrubProg(e.clientX); });

// ── Loop range ──
let loopIn = null, loopOut = null, loopActive = false;
const loopRangeOverlay = document.getElementById('loop-range-overlay');
const loopRangeDisplay = document.getElementById('loop-range-display');
const loopToggleBtn    = document.getElementById('loop-toggle');
const loopSetInBtn     = document.getElementById('loop-set-in');
const loopSetOutBtn    = document.getElementById('loop-set-out');

function updateLoopOverlay() {
  if (loopIn !== null && loopOut !== null && duration > 0) {
    const l = (loopIn / duration) * 100;
    const w = ((loopOut - loopIn) / duration) * 100;
    loopRangeOverlay.style.left  = l + '%';
    loopRangeOverlay.style.width = w + '%';
    loopRangeOverlay.classList.add('show');
    loopRangeDisplay.textContent = `${formatTime(loopIn)} → ${formatTime(loopOut)}`;
  } else {
    loopRangeOverlay.classList.remove('show');
    loopRangeDisplay.textContent = '—';
  }
}

loopSetInBtn.addEventListener('click', e => {
  e.stopPropagation();
  loopIn = video.currentTime;
  if (loopOut !== null && loopIn >= loopOut) loopOut = null;
  loopSetInBtn.classList.add('set');
  loopSetOutBtn.classList.toggle('set', loopOut !== null);
  updateLoopOverlay();
  showToast(`IN: ${formatTime(loopIn)}`);
  resetAutoHide();
});

loopSetOutBtn.addEventListener('click', e => {
  e.stopPropagation();
  loopOut = video.currentTime;
  if (loopIn !== null && loopOut <= loopIn) loopIn = null;
  loopSetOutBtn.classList.add('set');
  loopSetInBtn.classList.toggle('set', loopIn !== null);
  updateLoopOverlay();
  showToast(`OUT: ${formatTime(loopOut)}`);
  resetAutoHide();
});

loopToggleBtn.addEventListener('click', e => {

});

document.getElementById('save-btn').addEventListener('click', e => {
  e.stopPropagation();
  video.pause(); isPlaying = false; setPlayIcon(false);
  const w = video.videoWidth, h = video.videoHeight;
  hiddenCanvas.width = w; hiddenCanvas.height = h;
  const ctx = hiddenCanvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(video, 0, 0, w, h);
  const frame = Math.round(video.currentTime * fps);
  const tc = formatTime(video.currentTime).replace(/[:.]/g, '_');
  hiddenCanvas.toBlob(blob => {
    if (!blob) { showToast('截圖失敗'); return; }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `frame_${String(frame).padStart(6,'0')}_${tc}.png`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    showToast(`已儲存 Frame ${frame}（PNG）`);
  }, 'image/png');
  resetAutoHide();
});

// Prevent control taps from toggling play
controls.addEventListener('click', e => e.stopPropagation());

// ── Wake Lock: keep screen on while video is loaded ──
let wakeLock = null;

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
  } catch(e) {}
}

async function releaseWakeLock() {
  if (wakeLock) { try { await wakeLock.release(); } catch(e) {} wakeLock = null; }
}

// Re-acquire after tab becomes visible again (iOS releases it on background)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && playerScreen.style.display !== 'none') {
    requestWakeLock();
  }
});

// ── Export clip (FFmpeg.wasm) ──
const exportOverlay   = document.getElementById('export-overlay');
const exportStatus    = document.getElementById('export-status');
const exportProgressF = document.getElementById('export-progress-fill');
const exportCancelBtn = document.getElementById('export-cancel');
let ffmpegInstance = null;
let ffmpegLoaded = false;
let exportCancelled = false;

// ── Pending clip persistence ──
function savePendingClip() {
  if (loopIn === null || loopOut === null || !currentFile) return;
  try {
    localStorage.setItem('pendingClip', JSON.stringify({
      loopIn, loopOut,
      fileName: currentFile.name,
      fileSize: currentFile.size,
      format: document.getElementById('export-format')?.value || 'original',
      crashCount: (JSON.parse(localStorage.getItem('pendingClip') || '{}').crashCount || 0) + 1,
    }));
  } catch(e) {}
}
function clearPendingClip() {
  try { localStorage.removeItem('pendingClip'); } catch(e) {}
}

document.getElementById('loop-export').addEventListener('click', e => {
  e.stopPropagation();
  showToast('按下剪輯', 3000);

  Promise.resolve().then(async () => {
    if (loopIn === null || loopOut === null) { showToast('請先設定 IN / OUT', 4000); return; }
    if (!currentFile) { showToast('沒有影片檔案', 4000); return; }

    savePendingClip();
    const overlay = document.getElementById('export-overlay');
    const status  = document.getElementById('export-status');
    const bar     = document.getElementById('export-progress-fill');

    if (!overlay) { showToast('找不到 overlay 元素', 6000); return; }

    overlay.classList.add('show');
    status.textContent = '準備中…';
    bar.style.width = '5%';

    try {
      if (typeof MP4Box === 'undefined') throw new Error('MP4Box 未載入，請檢查網路');

      const base = currentFile.name.replace(/\.[^.]+$/, '') || 'clip';
      const ss   = loopIn.toFixed(3);

      status.textContent = '提取片段…';
      bar.style.width = '10%';

      const blob = await mp4boxClip(currentFile, loopIn, loopOut,
        pct => { bar.style.width = Math.round(10 + pct * 85) + '%'; });

      bar.style.width = '100%';
      status.textContent = '完成！';
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `${base}_clip_${ss.replace('.', '_')}.mp4`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 3000);
      setTimeout(() => overlay.classList.remove('show'), 1500);
      showToast('剪輯完成');
      clearPendingClip();

    } catch(err) {
      const msg = err?.message || String(err) || '未知錯誤';
      status.textContent = '失敗：' + msg;
      bar.style.width = '0%';
      setTimeout(() => overlay.classList.remove('show'), 10000);
      clearPendingClip();
    }
  }).catch(err => {
    showToast('頂層錯誤：' + (err?.message || String(err)), 8000);
  });
});

// ── mp4box.js clip extraction ──
async function mp4boxClip(file, clipIn, clipOut, onProgress) {
  showToast('mp4boxClip 開始', 4000);
  const SCAN = Math.min(10 * 1024 * 1024, file.size);

  // 1. Feed head to mp4box to get moov info
  const mp4info = await new Promise(async (resolve, reject) => {
    const mp4 = MP4Box.createFile();
    mp4.onError = e => reject(new Error('解析失敗: ' + e));
    mp4.onReady = info => { showToast('mp4box onReady OK', 3000); resolve({ info, file: mp4 }); };

    showToast('讀取頭部…', 3000);
    const headBuf = await readFileSlice(file, 0, SCAN);
    headBuf.fileStart = 0;
    mp4.appendBuffer(headBuf);
    mp4.flush();

    setTimeout(async () => {
      if (file.size > SCAN) {
        showToast('讀取尾部…', 3000);
        const tailBuf = await readFileSlice(file, file.size - SCAN, file.size);
        tailBuf.fileStart = file.size - SCAN;
        mp4.appendBuffer(tailBuf);
        mp4.flush();
      }
    }, 300);

    setTimeout(() => reject(new Error('mp4box 解析超時')), 10000);
  });

  const { info, file: mp4file } = mp4info;
  const vt = info.tracks.find(t => t.type === 'video');
  if (!vt) throw new Error('找不到視訊軌');

  // 2. Scan head AND tail for avcC/hvcC
  let decoderConfig = null;
  let trackType = 'avc1';

  async function scanForCodec(buf) {
    for (let i = 4; i + 8 <= buf.length; i++) {
      const nm = String.fromCharCode(buf[i],buf[i+1],buf[i+2],buf[i+3]);
      if (nm === 'avcC' || nm === 'hvcC') {
        const sz = (buf[i-4]<<24|buf[i-3]<<16|buf[i-2]<<8|buf[i-1])>>>0;
        if (sz >= 8) {
          decoderConfig = buf.slice(i + 4, i - 4 + sz).buffer;
          trackType = nm === 'hvcC' ? 'hvc1' : 'avc1';
          return true;
        }
      }
    }
    return false;
  }

  const headBuf2 = new Uint8Array(await readFileSlice(file, 0, SCAN));
  if (!await scanForCodec(headBuf2) && file.size > SCAN) {
    const tailBuf2 = new Uint8Array(await readFileSlice(file, file.size - SCAN, file.size));
    await scanForCodec(tailBuf2);
  }

  status.textContent = decoderConfig
    ? `codec: ${trackType} config: ${decoderConfig.byteLength} bytes`
    : '找不到 avcC！';
  await new Promise(r => setTimeout(r, 3000));

  // 3. Use our binary parser to get sample positions
  const pVt = parseVideoTrackFull(
    await (async () => {
      const SCAN2 = Math.min(10 * 1024 * 1024, file.size);
      const headBuf = await readFileSlice(file, 0, SCAN2);
      let moovBuf = null;
      const v = new DataView(headBuf);
      let off = 0;
      while (off + 8 <= headBuf.byteLength) {
        const sz = readU32(v, off), nm = read4cc(v, off + 4);
        if (sz < 8) break;
        if (nm === 'moov') { moovBuf = headBuf.slice(off, Math.min(off + sz, headBuf.byteLength)); break; }
        off += sz;
      }
      if (!moovBuf && file.size > SCAN2) {
        const tail = await readFileSlice(file, file.size - SCAN2, file.size);
        const tv = new DataView(tail);
        for (let i = 4; i + 8 <= tail.byteLength; i++) {
          if (read4cc(tv, i) === 'moov') {
            moovBuf = tail.slice(i - 4, Math.min(i - 4 + readU32(tv, i - 4), tail.byteLength)); break;
          }
        }
      }
      return moovBuf;
    })()
  );
  if (!pVt) throw new Error('無法解析視訊軌');

  const { timescale, stts, stsc, stco, stsz, stss, ctts, fixedSampleSize } = pVt;
  const TC = stco.length;

  function spc(ci) {
    let r = 1;
    for (let i = stsc.length - 1; i >= 0; i--)
      if (ci >= stsc[i].firstChunk - 1) { r = stsc[i].samplesPerChunk; break; }
    return r;
  }
  const css = new Array(TC);
  { let s = 0; for (let c = 0; c < TC; c++) { css[c] = s; s += spc(c); } }
  const TS = css[TC-1] + spc(TC-1);

  function time2s(sec) {
    const tgt = Math.round(sec * timescale); let s = 0, t = 0;
    for (const e of stts) {
      if (!e.delta) { s += e.count; continue; }
      const end = t + e.count * e.delta;
      if (end > tgt) return s + Math.floor((tgt - t) / e.delta);
      t = end; s += e.count;
    }
    return Math.min(s, TS);
  }
  function sSize(si) { return fixedSampleSize > 0 ? fixedSampleSize : (si < stsz.length ? stsz[si] : 0); }

  // Snap start to keyframe
  let s0 = time2s(clipIn);
  if (stss.length) {
    let kf = stss[0];
    for (const k of stss) { if (k <= s0) kf = k; else break; }
    s0 = kf;
  }
  const s1 = Math.min(TS, time2s(clipOut));

  // Build DTS table
  const dtsArr = new Float64Array(s1);
  { let t = 0, si = 0; for (const e of stts) { for (let i = 0; i < e.count && si < s1; i++) { dtsArr[si++] = t; t += e.delta; } } }

  // ctts lookup
  const ctsOffset = new Int32Array(s1);
  if (ctts && ctts.length) {
    let si = 0;
    for (const e of ctts) {
      for (let i = 0; i < e.count && si < s1; i++) ctsOffset[si++] = e.offset;
    }
  }

  const stssSet = new Set(stss);

  // 4. Collect sample metadata (byte positions)
  const sampleMeta = [];
  for (let si = s0; si < s1; si++) {
    // Find chunk and offset within chunk
    let chunk = 0;
    for (let c = 0; c < TC - 1; c++) { if (css[c+1] > si) break; chunk = c + 1; }
    chunk = Math.min(chunk, TC - 1);
    let byteOff = stco[chunk];
    for (let j = css[chunk]; j < si; j++) byteOff += sSize(j);
    sampleMeta.push({
      byteOff, sz: sSize(si),
      dts: dtsArr[si] - dtsArr[s0],
      cts: (dtsArr[si] + ctsOffset[si]) - (dtsArr[s0] + ctsOffset[s0]),
      dur: si + 1 < s1 ? dtsArr[si+1] - dtsArr[si] : (stts.length ? stts[stts.length-1].delta : 1),
      isSync: stssSet.size === 0 || stssSet.has(si),
    });
  }

  // 5. Read all sample bytes in one contiguous read
  const byteStart = sampleMeta[0].byteOff;
  const byteEnd   = Math.min(sampleMeta[sampleMeta.length-1].byteOff + sampleMeta[sampleMeta.length-1].sz, file.size);
  onProgress && onProgress(0.1);
  const rawBuf = new Uint8Array(await readFileSlice(file, byteStart, byteEnd));
  onProgress && onProgress(0.5);

  // 6. Build output with mp4box.js
  const outFile = MP4Box.createFile();
  const trackOpts = {
    timescale,
    width:  vt.video.width,
    height: vt.video.height,
    hdlr:   'vide',
    name:   'VideoHandler',
    type:   trackType,
  };
  if (decoderConfig) {
    if (trackType === 'avc1') trackOpts.avcDecoderConfigRecord = decoderConfig;
    else trackOpts.hevcDecoderConfigRecord = decoderConfig;
  }

  const newTid = outFile.addTrack(trackOpts);

  sampleMeta.forEach((s, i) => {
    const data = rawBuf.slice(s.byteOff - byteStart, s.byteOff - byteStart + s.sz);
    outFile.addSample(newTid, data.buffer, {
      duration: s.dur,
      dts:      s.dts,
      cts:      s.cts,
      is_sync:  s.isSync,
    });
    if (onProgress && i % 30 === 0) onProgress(0.5 + (i / sampleMeta.length) * 0.45);
  });

  const ds = new DataStream(undefined, 0, DataStream.BIG_ENDIAN);
  outFile.write(ds);
  onProgress && onProgress(1);
  return new Blob([ds.buffer], { type: 'video/mp4' });
}

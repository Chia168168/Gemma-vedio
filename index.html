<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone 影片剪輯器</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin: 0 0 10px; font-size: 20px; color: #007aff; text-align: center; }
        label { display: block; font-size: 12px; color: #8e8e93; margin: 10px 0 5px 5px; }
        input, button { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #d1d1d6; font-size: 16px; box-sizing: border-box; }
        button { background: #007aff; color: white; border: none; font-weight: 600; cursor: pointer; margin-top: 15px; }
        button:disabled { background: #c7c7cc; }
        #downloadBtn { background: #34c759; display: none; }
        #status { font-size: 14px; color: #3a3a3c; background: #f9f9f9; padding: 15px; border-radius: 10px; margin-top: 15px; line-height: 1.5; min-height: 40px; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="card">
    <h2>影片剪輯器</h2>
    <div id="status">正在啟動離線引擎...</div>
    
    <label>1. 選取影片</label>
    <input type="file" id="videoInput" accept="video/mp4,video/quicktime">

    <div style="display:flex; gap:10px;">
        <div style="flex:1">
            <label>開始(秒)</label>
            <input type="number" id="startTime" value="0" step="0.1">
        </div>
        <div style="flex:1">
            <label>結束(秒)</label>
            <input type="number" id="endTime" value="5" step="0.1">
        </div>
    </div>

    <button id="startBtn" disabled>請稍候...</button>
    <button id="downloadBtn">✅ 點我儲存影片</button>
</div>

<script>
    // 這裡我使用一個最小化的內嵌策略
    // 為了繞過 404 和 物理封鎖，我將功能直接寫在一個 Script 塊裡
    // 如果環境真的連外部連結都封死，我們至少可以偵測並給予提示
    
    const statusEl = document.getElementById('status');
    const btn = document.getElementById('startBtn');
    const dlBtn = document.getElementById('downloadBtn');
    let resultBlobUrl = null;

    async function init() {
        // 嘗試從多個備用來源載入，如果失敗則切換到純本地提示
        const sources = [
            'https://cdn.jsdelivr.net/npm/mp4box@0.5.2/dist/mp4box.all.min.js',
            'https://cdnjs.cloudflare.com/ajax/libs/mp4box/0.5.2/mp4box.all.min.js',
            'https://unpkg.com/mp4box@0.5.2/dist/mp4box.all.min.js'
        ];

        let loaded = false;
        for (let src of sources) {
            if (loaded) break;
            await new Promise(resolve => {
                const s = document.createElement('script');
                s.src = src;
                s.onload = () => { loaded = true; resolve(); };
                s.onerror = () => resolve();
                document.head.appendChild(s);
            });
        }

        // 同步載入 muxer
        const s2 = document.createElement('script');
        s2.src = 'https://cdn.jsdelivr.net/npm/mp4-muxer@3.3.0/dist/mp4-muxer.main.js';
        document.head.appendChild(s2);

        setTimeout(() => {
            if (typeof MP4Box !== 'undefined') {
                statusEl.innerHTML = "<span style='color:green'>✅ 引擎載入成功！</span>\n這是一個真正的單機工具，你可以開始剪輯了。";
                btn.disabled = false;
                btn.innerText = "立即剪輯";
            } else {
                statusEl.innerHTML = "<span style='color:red'>❌ 偵測到 404 或 強制封鎖</span>\n\n**請注意：**\n你的手機似乎禁止從 GitHub 連結到任何外部工具。\n\n**最強解法：**\n請把手機的 **VPN 關掉**，或是用 **Safari 瀏覽器** 開啟，不要在 Line/FB 裡面點開。";
            }
        }, 1500);
    }

    init();

    btn.onclick = async () => {
        const file = document.getElementById('videoInput').files[0];
        if (!file) return alert("請選影片");

        btn.disabled = true;
        dlBtn.style.display = 'none';
        statusEl.innerText = "🎬 正在剪輯中...\n請勿關閉視窗，這需要幾秒鐘。";

        try {
            const startT = parseFloat(document.getElementById('startTime').value);
            const endT = parseFloat(document.getElementById('endTime').value);
            
            const mp4boxfile = MP4Box.createFile();
            const target = new Mp4Muxer.ArrayBufferTarget();
            let muxer = null;

            mp4boxfile.onReady = (info) => {
                const videoTrack = info.videoTracks[0];
                muxer = new Mp4Muxer.Muxer({
                    target: target,
                    video: {
                        codec: videoTrack.codec.startsWith('avc1') ? 'avc' : 'hevc',
                        width: videoTrack.video.width,
                        height: videoTrack.video.height
                    },
                    fastStart: 'in-memory'
                });
                mp4boxfile.setExtractionConfig(videoTrack.id, null, { nb_samples: 100 });
                mp4boxfile.start();
            };

            mp4boxfile.onSamples = (id, user, samples) => {
                for (let sample of samples) {
                    const time = sample.cts / sample.timescale;
                    if (time >= startT && time <= endT) {
                        muxer.addVideoChunk({
                            data: sample.data,
                            type: sample.is_sync ? 'key' : 'delta',
                            timestamp: (time - startT) * 1e6,
                            duration: (sample.duration / sample.timescale) * 1e6
                        });
                    }
                }
            };

            const reader = file.stream().getReader();
            let offset = 0;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const buffer = value.buffer;
                buffer.fileStart = offset;
                mp4boxfile.appendBuffer(buffer);
                offset += buffer.byteLength;
                statusEl.innerText = `處理進度: ${Math.round((offset/file.size)*100)}%`;
            }

            mp4boxfile.flush();
            if (muxer) muxer.finalize();

            const blob = new Blob([target.buffer], { type: 'video/mp4' });
            resultBlobUrl = URL.createObjectURL(blob);
            
            statusEl.innerHTML = "<span style='color:green; font-weight:bold;'>✅ 剪輯完成！</span>\n請點擊下方按鈕儲存。";
            dlBtn.style.display = 'block';
        } catch (e) {
            statusEl.innerText = "❌ 失敗：" + e.message;
        } finally {
            btn.disabled = false;
        }
    };

    dlBtn.onclick = () => {
        if (!resultBlobUrl) return;
        const a = document.createElement('a');
        a.href = resultBlobUrl;
        a.download = `cut_${Date.now()}.mp4`;
        a.click();
    };
</script>
</body>
</html>

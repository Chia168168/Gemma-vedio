<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone 剪輯除錯版</title>
    <!-- 1. 改用傳統 script 載入，不使用 module -->
    <script src="https://cdn.jsdelivr.net/npm/mp4box@0.5.2/dist/mp4box.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mp4-muxer@3.3.0/dist/mp4-muxer.main.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f2f2f7; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { width: 100%; padding: 15px; background: #007aff; color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; }
        #status { margin-top: 15px; background: #eee; padding: 10px; font-size: 12px; min-height: 50px; border-radius: 5px; color: red; }
    </style>
</head>
<body>

<div class="card">
    <h3>剪輯測試 (Debug Mode)</h3>
    <input type="file" id="videoInput" accept="video/mp4,video/quicktime">
    <button id="startBtn">點擊測試</button>
    <div id="status">狀態預覽窗（若沒反應請告知內容）</div>
</div>

<script>
    // 強制捕捉全域錯誤
    window.onerror = function(msg, url, line) {
        document.getElementById('status').innerText = "全域錯誤: " + msg + "\n行號: " + line;
    };

    const btn = document.getElementById('startBtn');
    const status = document.getElementById('status');

    btn.onclick = async () => {
        status.style.color = "blue";
        status.innerText = "按鈕已觸發...";

        try {
            // 檢查函式庫是否成功載入
            if (typeof MP4Box === 'undefined') throw new Error("MP4Box 載入失敗");
            if (typeof Mp4Muxer === 'undefined') throw new Error("Mp4Muxer 載入失敗");

            const fileInput = document.getElementById('videoInput');
            const file = fileInput.files[0];
            if (!file) throw new Error("請先選檔案");

            status.innerText = "檔案名稱: " + file.name + "\n檔案大小: " + (file.size / 1024 / 1024).toFixed(2) + " MB";

            // 測試是否有 stream 權限
            if (!file.stream) throw new Error("iPhone 限制：請在 HTTPS 環境開啟此網頁");

            status.innerText += "\n\n正在嘗試啟動 MP4Box...";
            
            const mp4boxfile = MP4Box.createFile();
            
            // 讀取前 1MB 測試
            const reader = file.stream().getReader();
            const { value } = await reader.read();
            const buffer = value.buffer;
            buffer.fileStart = 0;
            
            mp4boxfile.onReady = (info) => {
                alert("成功識別影片！可以開始剪輯。");
                status.innerText = "影片寬度: " + info.videoTracks[0].video.width;
            };

            mp4boxfile.appendBuffer(buffer);
            status.innerText += "\n已讀取初步數據，等待 onReady...";

        } catch (err) {
            status.style.color = "red";
            status.innerText = "停止原因: " + err.message;
            alert("錯誤: " + err.message);
        }
    };
</script>

</body>
</html>

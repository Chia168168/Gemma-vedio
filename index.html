<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Video Cutter (GitHub Edition)</title>
    <!-- 1. 優先載入 MP4Box (這個函式庫比較老，用傳統方式載入) -->
    <script src="https://cdn.jsdelivr.net/npm/mp4box@0.5.2/dist/mp4box.all.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; padding: 20px; text-align: center; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input, button { width: 100%; margin-top: 15px; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { background: #007aff; color: white; border: none; font-weight: bold; }
        button:disabled { background: #c7c7cc; }
        #status { margin-top: 15px; font-size: 13px; color: #333; min-height: 40px; word-break: break-all; }
        .success { color: #34c759; font-weight: bold; }
        .error { color: #ff3b30; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>影片剪輯器</h2>
    <p style="font-size: 12px; color: #8e8e93;">GitHub Pages 串流版 (支援 200MB+)</p>
    
    <input type="file" id="videoInput" accept="video/mp4,video/quicktime">
    <div style="display:flex; gap:10px;">
        <input type="number" id="startTime" placeholder="開始(秒)" value="0">
        <input type="number" id="endTime" placeholder="結束(秒)" value="5">
    </div>
    <button id="startBtn">開始處理</button>
    <div id="status">正在檢測環境...</div>
</div>

<script type="module">
    // 2. 使用 ESM 方式載入 Mp4Muxer，這在 GitHub Pages 上最穩定
    import * as Mp4Muxer from 'https://cdn.jsdelivr.net/npm/mp4-muxer@3.3.0/+esm';

    const btn = document.getElementById('startBtn');
    const status = document.getElementById('status');

    // 檢查環境
    window.addEventListener('load', () => {
        if (typeof MP4Box === 'undefined') {
            status.innerHTML = '<span class="error">❌ MP4Box 載入失敗，請重新整理頁面</span>';
        } else {
            status.innerHTML = '<span class="success">✅ 環境準備就緒 (GitHub 已連線)</span>';
        }
    });

    btn.onclick = async () => {
        const file = document.getElementById('videoInput').files[0];
        if (!file) return alert("請選取檔案");

        btn.disabled = true;
        status.innerText = "正在分析影片串流...";

        try {
            const startT = parseFloat(document.getElementById('startTime').value);
            const endT = parseFloat(document.getElementById('endTime').value);
            
            const mp4boxfile = MP4Box.createFile();
            let muxer = null;
            const target = new Mp4Muxer.ArrayBufferTarget();

            mp4boxfile.onReady = (info) => {
                const videoTrack = info.videoTracks[0];
                muxer = new Mp4Muxer.Muxer({
                    target: target,
                    video: {
                        codec: videoTrack.codec.startsWith('avc1') ? 'avc' : 'hevc',
                        width: videoTrack.video.width,
                        height: videoTrack.video.height
                    },
                    fastStart: 'in-memory'
                });
                mp4boxfile.setExtractionConfig(videoTrack.id, null, { nb_samples: 100 });
                mp4boxfile.start();
            };

            mp4boxfile.onSamples = (id, user, samples) => {
                for (let sample of samples) {
                    const time = sample.cts / sample.timescale;
                    if (time >= startT && time <= endT) {
                        muxer.addVideoChunk({
                            data: sample.data,
                            type: sample.is_sync ? 'key' : 'delta',
                            timestamp: (time - startT) * 1e6,
                            duration: (sample.duration / sample.timescale) * 1e6
                        });
                    }
                }
            };

            // 串流讀取，解決 200MB 限制
            const reader = file.stream().getReader();
            let offset = 0;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const buffer = value.buffer;
                buffer.fileStart = offset;
                mp4boxfile.appendBuffer(buffer);
                offset += buffer.byteLength;
                status.innerText = `進度: ${Math.round((offset/file.size)*100)}%`;
            }

            mp4boxfile.flush();
            if (muxer) muxer.finalize();

            status.innerText = "處理完成，準備下載...";
            const blob = new Blob([target.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `cut_${Date.now()}.mp4`;
            a.click();
            status.innerHTML = '<span class="success">✅ 下載成功！</span>';
        } catch (err) {
            status.innerHTML = `<span class="error">停止原因: ${err.message}</span>`;
        } finally {
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
